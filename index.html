<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Cocktail Master - Ultimate Native Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { ios: { red: '#FA2D48', blue: '#0A84FF', gold: '#D4AF37', gray: '#8E8E93', darkBg: '#000000', surface: '#1C1C1E' } } }
            }
        }
    </script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .iphone { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #000; }
        
        .content-wrap { flex: 1; display: flex; flex-direction: column; height: 100%; transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1); position: relative; overflow: hidden; }
        .content-shrink { transform: scale(0.93) translateY(-10px); border-radius: 40px; opacity: 0.5; pointer-events: none; filter: blur(3px); }
        .content { flex: 1; overflow-y: auto; scroll-behavior: smooth; width: 100%; height: 100%; padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px)); }
        
        .content::-webkit-scrollbar, .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-pill { backdrop-filter: saturate(180%) blur(30px); background: rgba(28, 28, 30, 0.85); border: 0.5px solid rgba(255, 255, 255, 0.1); }
        .tab-bar-container { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; transition: transform 0.5s; padding-bottom: env(safe-area-inset-bottom, 12px); height: calc(65px + env(safe-area-inset-bottom, 12px)); backdrop-filter: saturate(200%) blur(30px); -webkit-backdrop-filter: saturate(200%) blur(30px); background: rgba(18, 18, 20, 0.9); border-top: 0.5px solid rgba(255, 255, 255, 0.05); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666666; cursor: pointer; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); font-weight: 500; transform-origin: center; height: 100%; padding-top: 8px; }
        .tab-item:active { transform: scale(0.9); opacity: 0.7; }
        .tab-item.active { color: #FA2D48; transform: scale(1.05); font-weight: 700; }
        .tab-item svg { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); color: inherit; }

        @keyframes fluid-rotate { from { transform: translate(-10%, -10%) rotate(0deg); } to { transform: translate(10%, 10%) rotate(360deg); } }
        .liquid-bg { position: relative; overflow: hidden; background: #000; }
        .liquid-bg::before { content: ''; position: absolute; top: -75%; left: -75%; width: 250%; height: 250%; background: var(--bg-grad); filter: blur(65px); animation: fluid-rotate 25s infinite linear; opacity: 0.5; z-index: 0; }

        .cover-card { 
            aspect-ratio: 1 / 1; border-radius: 20px; position: relative; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.08), inset 0 -1px 20px rgba(0,0,0,0.5); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.03);
        }
        .cover-card:active { transform: scale(0.94); box-shadow: 0 4px 15px rgba(0,0,0,0.5); filter: brightness(0.9); }
        
        .card-initial {
            position: absolute; top: -10%; right: -5%; font-size: 110px; font-weight: 900; font-style: italic;
            color: rgba(255, 255, 255, 0.04); z-index: 1; pointer-events: none; user-select: none;
            mix-blend-mode: plus-lighter;
        }

        .cover-label { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
            color: #fff; z-index: 10; 
        }

        .large-title { font-size: 34px; font-weight: 800; padding: 70px 24px 12px 24px; letter-spacing: -1px; color: white; transition: all 0.3s ease; }

        #recipeDetail { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; }
        .detail-show .detail-inner { opacity: 1; transform: translateY(0); }
        .detail-inner { transition: all 0.4s ease 0.1s; opacity: 0; transform: translateY(25px); }

        .ing-tag { border: 1px solid rgba(255,255,255,0.1); color: #999; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); background: rgba(255,255,255,0.03); }
        .ing-tag:active { transform: scale(0.92); }
        .ing-tag.selected { background: #FA2D48; color: #fff; border-color: #FA2D48; transform: scale(1.05); box-shadow: 0 4px 15px rgba(250,45,72,0.4); font-weight: 700; }

        @keyframes stagger-fade-in { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .stagger-item { opacity: 0; animation: stagger-fade-in 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

        @keyframes pour-action { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
        @keyframes muddle-action { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
        @keyframes shake-action { 0%, 100% { transform: translate(0,0) rotate(0deg); } 25% { transform: translate(2px,-2px) rotate(5deg); } 75% { transform: translate(-2px,2px) rotate(-5deg); } }
        @keyframes item-fall { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes spin-stir { 0% { transform: scaleX(1); } 50% { transform: scaleX(-1); } 100% { transform: scaleX(1); } }
        @keyframes flame-flicker { 0%, 100% { transform: scale(1) skewX(0deg); opacity: 0.9; } 50% { transform: scale(1.1) skewX(-5deg); opacity: 1; } }
        @keyframes rim-glow { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 3px white); } }
        @keyframes wipe-wedge { 0% { transform: translate(var(--startX), var(--y)) rotate(-25deg); } 100% { transform: translate(var(--endX), var(--y)) rotate(25deg); } }
        
        @keyframes vigorous-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-5px, -5px) rotate(-15deg); }
            20% { transform: translate(5px, 5px) rotate(15deg); }
            30% { transform: translate(-5px, 5px) rotate(-15deg); }
            40% { transform: translate(5px, -5px) rotate(15deg); }
            50% { transform: translate(-5px, -5px) rotate(-15deg); }
            60% { transform: translate(5px, 5px) rotate(15deg); }
            70% { transform: translate(-5px, 5px) rotate(-15deg); }
            80% { transform: translate(5px, -5px) rotate(15deg); }
            90% { transform: translate(-5px, -5px) rotate(-15deg); }
        }

        .anim-pour-line { stroke-dasharray: 4 4; animation: pour-action 0.3s infinite linear; }
        .anim-muddler { animation: muddle-action 0.4s infinite ease-in-out; }
        .anim-shaker { transform-origin: 32px 32px; animation: shake-action 0.2s infinite; }
        .anim-vigorous-shake { animation: vigorous-shake 0.4s infinite ease-in-out; transform-origin: center; }
        .anim-item-fall { animation: item-fall 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .anim-stir { animation: spin-stir 1s infinite ease-in-out; transform-origin: 32px center; }
        .anim-flame { animation: flame-flicker 0.15s infinite alternate; transform-origin: 32px 20px; }
        .anim-pour-bounce { animation: muddle-action 0.8s infinite ease-in-out; }
        .anim-rim-glow { animation: rim-glow 0.8s infinite alternate ease-in-out; }
        .anim-wipe-wedge { animation: wipe-wedge 1.2s infinite alternate ease-in-out; }
        
        /* 专门用于大字排版的衬线艺术字体 */
        .font-art { font-family: "Songti SC", "Noto Serif CJK SC", "STSong", "PT Serif", serif; }

        /* --- 白天模式全局覆盖 (Light Mode Overrides) --- */
        body.light { background-color: #F2F2F7; color: #000; }
        body.light .iphone, body.light .liquid-bg { background-color: #F2F2F7; }

        body.light .text-white { color: #000; }

        body.light .text-white\/40 { color: rgba(0,0,0,0.4); }
        body.light .text-white\/50 { color: rgba(0,0,0,0.5); }
        body.light .text-white\/60 { color: rgba(0,0,0,0.6); }
        body.light .text-white\/70 { color: rgba(0,0,0,0.7); }
        body.light .text-white\/80 { color: rgba(0,0,0,0.8); }
        body.light .text-white\/90 { color: rgba(0,0,0,0.9); }
        
        body.light .cover-card .text-white, body.light #randomCardWrap .text-white { color: #fff; }
        body.light .cover-card .text-white\/5, body.light #randomCardWrap .text-white\/5 { color: rgba(255,255,255,0.1); }
        body.light .cover-card .text-white\/40, body.light #randomCardWrap .text-white\/40 { color: rgba(255,255,255,0.4); }
        body.light .cover-card .text-white\/60, body.light #randomCardWrap .text-white\/60 { color: rgba(255,255,255,0.6); }
        body.light .cover-card .text-white\/80, body.light #randomCardWrap .text-white\/80 { color: rgba(255,255,255,0.8); }
        
        body.light .bg-\[\#1C1C1E\] { background-color: #FFFFFF; }
        body.light .bg-\[\#1C1C1E\]\/60 { background-color: rgba(255,255,255,0.6); }
        body.light .bg-\[\#1C1C1E\]\/80 { background-color: rgba(255,255,255,0.8); }
        body.light .bg-\[\#1C1C1E\]\/95 { background-color: rgba(255,255,255,0.95); }
        body.light .bg-\[\#000\] { background-color: #F2F2F7; }
        body.light .bg-\[\#000\]\/80 { background-color: rgba(255,255,255,0.8); }
        
        body.light .bg-black\/30 { background-color: rgba(0,0,0,0.05); }
        body.light .bg-black\/40 { background-color: rgba(0,0,0,0.08); }
        body.light .bg-black\/60 { background-color: rgba(255,255,255,0.6); }
        body.light .bg-black\/80 { background-color: rgba(255,255,255,0.9); }
        
        body.light .bg-white\/5 { background-color: rgba(0,0,0,0.03); }
        body.light .bg-white\/10 { background-color: rgba(0,0,0,0.06); }
        body.light .bg-white\/20 { background-color: rgba(0,0,0,0.1); }
        body.light .bg-white\/\[0\.04\] { background-color: rgba(255,255,255,0.6); }
        body.light .bg-white\/\[0\.05\] { background-color: rgba(0,0,0,0.05); }
        
        body.light .border-white\/5 { border-color: rgba(0,0,0,0.05); }
        body.light .border-white\/10 { border-color: rgba(0,0,0,0.1); }
        body.light .border-white\/20 { border-color: rgba(0,0,0,0.2); }
        body.light .border-white\/30 { border-color: rgba(0,0,0,0.3); }
        body.light .border-white\/\[0\.05\] { border-color: rgba(0,0,0,0.05); }
        body.light .border-white\/\[0\.08\] { border-color: rgba(0,0,0,0.08); }
        
        body.light svg text { fill: #000 !important; }
        body.light svg line[stroke="rgba(255,255,255,0.2)"] { stroke: rgba(0,0,0,0.1) !important; }
        body.light svg polygon[stroke="rgba(255,255,255,0.15)"] { stroke: rgba(0,0,0,0.1) !important; }
        
        body.light #animationStage svg path[stroke="white"],
        body.light #animationStage svg line[stroke="white"],
        body.light #animationStage svg path[stroke="rgba(255,255,255,0.9)"],
        body.light #animationStage svg line[stroke="rgba(255,255,255,0.9)"] { stroke: rgba(0,0,0,0.8) !important; }
        
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.8)"] { fill: rgba(0,0,0,0.2) !important; }
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.7)"] { fill: rgba(0,0,0,0.3) !important; }
        body.light #animationStage svg path[fill="rgba(255,255,255,0.2)"] { fill: rgba(0,0,0,0.1) !important; }
        
        body.light .tab-bar-container { background: rgba(255,255,255,0.9); border-top-color: rgba(0,0,0,0.1); }
        body.light #diyModal input, body.light #diyModal textarea, body.light #diyModal select { color: #000; }
        body.light #diyModal select option { background: #fff; color: #000; }
        body.light #toast { background: rgba(255,255,255,0.95); color: #000; border-color: rgba(0,0,0,0.1); }
    </style>
</head>

<script>
    // --- 全局状态 ---
    const DEEPSEEK_API_KEY = "sk-7cdc2f2e2d8e433c8bf035a757546a31"; // 替换为你的 DeepSeek API Key
    let favoritedIds = [];
    let currentDetailId = null;
    let animTimer = null;
    let isOz = false; 
    let isLightMode = false; // 新增白天模式状态
    let myCabinet = [];
    let currentListBase = '全部';

    // --- 本地数据持久化引擎 ---
    function loadLocalData() {
        try {
            const f = localStorage.getItem('cm_favs'); if(f) favoritedIds = JSON.parse(f);
            const c = localStorage.getItem('cm_cabinet'); if(c) myCabinet = JSON.parse(c);
            const o = localStorage.getItem('cm_isOz'); if(o) isOz = JSON.parse(o);
            const l = localStorage.getItem('cm_isLight'); 
            if(l) { 
                isLightMode = JSON.parse(l); 
                document.body.classList.toggle('light', isLightMode); 
            }
            const cr = localStorage.getItem('cm_custom_recipes');
            if(cr) {
                const customRecipes = JSON.parse(cr).map(d => ({...d, reqCats: new Set(d.reqCats)}));
                cocktailDB.unshift(...customRecipes);
            }
        } catch(e) { console.error('加载本地数据失败', e); }
    }

    function saveLocalData() {
        try {
            localStorage.setItem('cm_favs', JSON.stringify(favoritedIds));
            localStorage.setItem('cm_cabinet', JSON.stringify(myCabinet));
            localStorage.setItem('cm_isOz', JSON.stringify(isOz));
            localStorage.setItem('cm_isLight', JSON.stringify(isLightMode));
            const customRecipes = cocktailDB.filter(d => String(d.id).startsWith('diy_') || String(d.id).startsWith('ai_')).map(d => ({...d, reqCats: Array.from(d.reqCats)}));
            localStorage.setItem('cm_custom_recipes', JSON.stringify(customRecipes));
        } catch(e) { console.error('保存本地数据失败', e); }
    }

    const haptic = (type = 'light') => {
        if (!navigator || !navigator.vibrate) return;
        try {
            if (type === 'light') navigator.vibrate(10); 
            else if (type === 'medium') navigator.vibrate([15, 30, 15]); 
            else if (type === 'heavy') navigator.vibrate([40, 30, 40]); 
            else if (type === 'success') navigator.vibrate([10, 30, 20, 30, 30]); 
        } catch(e){}
    };

    const modernGradients = [
        "radial-gradient(circle at 80% 0%, rgba(250,45,72,0.3) 0%, transparent 60%), radial-gradient(circle at 20% 100%, rgba(142,45,226,0.15) 0%, transparent 60%), #141213",
        "radial-gradient(circle at 10% 10%, rgba(10,132,255,0.3) 0%, transparent 60%), radial-gradient(circle at 90% 90%, rgba(94,92,230,0.15) 0%, transparent 60%), #111316",
        "radial-gradient(circle at 90% 20%, rgba(212,175,55,0.25) 0%, transparent 60%), radial-gradient(circle at 10% 80%, rgba(250,45,72,0.15) 0%, transparent 60%), #181512",
        "radial-gradient(circle at 20% 0%, rgba(48,209,88,0.25) 0%, transparent 60%), radial-gradient(circle at 80% 100%, rgba(10,132,255,0.15) 0%, transparent 60%), #121614",
        "radial-gradient(circle at 80% 80%, rgba(191,90,242,0.3) 0%, transparent 60%), radial-gradient(circle at 20% 20%, rgba(250,45,72,0.15) 0%, transparent 60%), #151216",
        "radial-gradient(circle at 100% 0%, rgba(255,159,10,0.3) 0%, transparent 60%), radial-gradient(circle at 0% 100%, rgba(255,55,95,0.15) 0%, transparent 60%), #161311",
        "radial-gradient(circle at 0% 50%, rgba(100,210,255,0.25) 0%, transparent 60%), radial-gradient(circle at 100% 50%, rgba(0,199,190,0.2) 0%, transparent 60%), #111516",

        return text.replace(/(\d+(\.\d+)?)\s*ml/gi, (m, val) => (parseFloat(val)/30).toFixed(1) + ' oz');
    }

    function getRadarSvg(flavors, color) {
        const rMax = 35;
        const pts = flavors.map((f, i) => { const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (f/100)*rMax*Math.cos(angle)},${50 - (f/100)*rMax*Math.sin(angle)}`; }).join(' ');
        let bgWeb = [100, 75, 50, 25].map(p => {
            let str = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (p/100)*rMax*Math.cos(angle)},${50 - (p/100)*rMax*Math.sin(angle)}`; }).join(' ');
            return `<polygon points="${str}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
        }).join('');
        let axes = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<line x1="50" y1="50" x2="${50+rMax*Math.cos(angle)}" y2="${50-rMax*Math.sin(angle)}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`; }).join('');
        let texts = ['酸', '甜', '苦', '烈', '果香'].map((l,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<text x="${50+42*Math.cos(angle)}" y="${50-42*Math.sin(angle)+2}" fill="white" font-size="11" font-weight="900" text-anchor="middle" dominant-baseline="middle" opacity="0.9">${l}</text>`; }).join('');
        return `<svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">${bgWeb}${axes}<polygon points="${pts}" fill="${color}" opacity="0.65" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${texts}</svg>`;
    }

    function renderStepSvg(drink, text, idx) {
        let conf;
        switch(drink.glass) {
            case 'martini': conf = { path: 'M 10 15 L 32 40 L 54 15 Z M 32 40 L 32 56 M 22 56 L 42 56', clip: 'M 10 15 L 32 40 L 54 15 Z', topY: 15, bottomY: 40, rim: {x1: 10, x2: 54}, ice: [{x: 29, y: 30, size: 6}], stir: {x1: 42, y1: 5, x2: 32, y2: 38}, garnish: {x: 44, y: 15}, muddle: null }; break;
            case 'rocks': conf = { path: 'M 18 20 L 22 56 L 42 56 L 46 20', clip: 'M 18 20 L 22 56 L 42 56 L 46 20 Z', topY: 20, bottomY: 56, rim: {x1: 18, x2: 46}, ice: [{x: 22, y: 44, size: 10}, {x: 32, y: 44, size: 10}, {x: 27, y: 34, size: 10}], stir: {x1: 44, y1: 8, x2: 26, y2: 54}, garnish: {x: 44, y: 20}, muddle: {x: 32, y: 20, w: 6, h: 36} }; break;
            case 'highball': conf = { path: 'M 22 10 L 22 56 L 42 56 L 42 10', clip: 'M 22 10 L 22 56 L 42 56 L 42 10 Z', topY: 10, bottomY: 56, rim: {x1: 22, x2: 42}, ice: [{x: 28, y: 46, size: 8}, {x: 28, y: 36, size: 8}, {x: 28, y: 26, size: 8}], stir: {x1: 46, y1: 2, x2: 28, y2: 54}, garnish: {x: 42, y: 10}, muddle: {x: 32, y: 10, w: 6, h: 46} }; break;
            case 'shot': conf = { path: 'M 24 36 L 26 56 L 38 56 L 40 36', clip: 'M 24 36 L 26 56 L 38 56 L 40 36 Z', topY: 36, bottomY: 56, rim: {x1: 24, x2: 40}, ice: [], stir: {x1: 42, y1: 24, x2: 32, y2: 54}, garnish: {x: 38, y: 36}, muddle: null }; break;
            case 'flute': conf = { path: 'M 26 12 L 26 38 C 26 48, 38 48, 38 38 L 38 12 M 32 46 L 32 56 M 24 56 L 40 56', clip: 'M 26 12 L 26 38 C 26 48, 38 48, 38 38 L 38 12 Z', topY: 12, bottomY: 46, rim: {x1: 26, x2: 38}, ice: [], stir: {x1: 42, y1: 4, x2: 32, y2: 44}, garnish: {x: 36, y: 12}, muddle: null }; break;
            case 'coupe': default: conf = { path: 'M 10 18 C 10 40, 54 40, 54 18 M 32 38 L 32 56 M 22 56 L 42 56', clip: 'M 10 18 C 10 40, 54 40, 54 18 Z', topY: 18, bottomY: 38, rim: {x1: 10, x2: 54}, ice: [{x: 28, y: 28, size: 8}], stir: {x1: 46, y1: 6, x2: 32, y2: 36}, garnish: {x: 48, y: 18}, muddle: null }; break;
        }

        let frontElements = ''; let clippedItems = ''; 
        let themeC = drink.themeColor || 'white';
        let ratio = Math.max(0.05, (idx + 1) / drink.steps.length);
        let currentY = conf.bottomY - ((conf.bottomY - conf.topY) * ratio);

        if(/摇晃|干摇/.test(text)) {
            return `<svg viewBox="0 0 64 64" class="w-full h-full overflow-visible"><g class="anim-shaker"><path d="M 22 25 L 24 52 C 24 56, 40 56, 40 52 L 42 25 Z" fill="${themeC}" opacity="0.3"/><path d="M 22 25 L 24 52 C 24 56, 40 56, 40 52 L 42 25 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><path d="M 20 25 L 44 25 L 38 12 L 26 12 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><path d="M 26 12 C 26 6, 38 6, 38 12" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></g></svg>`;
        }
        if(/方糖|糖块|冰块|加冰|老冰/.test(text)) {
            conf.ice.forEach((ice, i) => { clippedItems += `<rect x="${ice.x}" y="${ice.y}" width="${ice.size}" height="${ice.size}" rx="2" fill="rgba(255,255,255,0.8)" class="anim-item-fall" style="animation-delay: ${i*0.1}s"/>`; });
        }
        if(/捣碎|压碎|打发/.test(text)) {
            if (conf.muddle) clippedItems += `<rect x="${conf.muddle.x - conf.muddle.w/2}" y="${conf.muddle.y}" width="${conf.muddle.w}" height="${conf.muddle.h}" rx="3" fill="rgba(255,255,255,0.7)" class="anim-muddler"/>`;
            else clippedItems += `<rect x="30" y="${conf.topY}" width="4" height="40" rx="2" fill="rgba(255,255,255,0.7)" class="anim-muddler"/>`;
        }
        let stirrerHtml = '';
        if(/搅拌|Rolling|混合/.test(text)) { stirrerHtml = `<line x1="${conf.stir.x1}" y1="${conf.stir.y1}" x2="${conf.stir.x2}" y2="${conf.stir.y2}" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" class="anim-stir"/>`; }
        if(/倒|注|补满|浮/.test(text)) {
            frontElements += `<g transform="translate(32, -5)"><path d="M -4 5 L -8 15 L 8 15 L 4 5 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" stroke-linejoin="round" class="anim-pour-bounce"/><line x1="0" y1="15" x2="0" y2="${currentY + 5}" stroke="${themeC}" stroke-width="2.5" stroke-linecap="round" class="anim-pour-line" stroke-dasharray="6 4"/></g>`;
        }
        if(/擦拭|沾上|盐圈|糖边/.test(text)) {
            frontElements += `<line x1="${conf.rim.x1}" y1="${conf.topY}" x2="${conf.rim.x2}" y2="${conf.topY}" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 4" class="anim-rim-glow"/><path d="M -6 -8 Q 0 0 6 -8 Z" fill="${themeC}" class="anim-wipe-wedge" style="--startX: ${conf.rim.x1}px; --endX: ${conf.rim.x2}px; --y: ${conf.topY}px;"/>`;
        }
        if(/点燃|火焰/.test(text)) { frontElements += `<path d="M 32 ${conf.topY-2} C 35 ${conf.topY-10}, 32 ${conf.topY-20}, 32 ${conf.topY-20} C 32 ${conf.topY-20}, 29 ${conf.topY-10}, 32 ${conf.topY-2}" fill="#FF5722" class="anim-flame"/>`; }
        if(/装饰|精油|樱桃|薄荷|柠檬皮|橙皮|橄榄|青柠角|咖啡豆/.test(text)) {
            frontElements += `<g class="anim-item-fall"><circle cx="${conf.garnish.x}" cy="${conf.garnish.y}" r="3.5" fill="${themeC}"/><path d="M ${conf.garnish.x} ${conf.garnish.y} Q ${conf.garnish.x+6} ${conf.garnish.y-6} ${conf.garnish.x+10} ${conf.garnish.y-2}" fill="none" stroke="${themeC}" stroke-width="2" stroke-linecap="round"/></g>`;
        }

        return `<svg viewBox="0 0 64 64" class="w-full h-full overflow-visible">
            <defs><clipPath id="c_${drink.id}"><path d="${conf.clip}"/></clipPath></defs>
            ${stirrerHtml}
            <g clip-path="url(#c_${drink.id})">
                <rect x="0" y="${currentY}" width="64" height="64" fill="${themeC}" opacity="0.5" class="transition-all duration-700 ease-in-out"/>
                <line x1="0" y1="${currentY}" x2="64" y2="${currentY}" stroke="${themeC}" stroke-width="1.5" opacity="0.8" class="transition-all duration-700 ease-in-out"/>
                ${clippedItems}
            </g>
            <path d="${conf.path}" fill="none" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
            ${frontElements}
        </svg>`;
    }

    function switchPage(pageId, el, filter=null, direction='fade') {
        haptic('light'); 
        if(animTimer) clearInterval(animTimer);
        const content = document.getElementById('appContent');
        content.style.transition = 'all 0.25s cubic-bezier(0.32, 0.72, 0, 1)';
        content.style.opacity = '0';
        if(direction === 'forward') content.style.transform = 'translateX(-30px)';
        else if(direction === 'backward') content.style.transform = 'translateX(30px)';
        else content.style.transform = 'scale(0.97)';
        
        setTimeout(() => {
            if(pageId==='recipes') renderList(filter);
            else if(pageId==='cabinet') renderCabinet();
            else if(pageId==='randomizer') renderShuffle();
            else if(pageId==='profile') renderProfile();
            
            content.style.transition = 'none';
            if(direction === 'forward') content.style.transform = 'translateX(40px)';
            else if(direction === 'backward') content.style.transform = 'translateX(-40px)';
            else content.style.transform = 'scale(1.02)';
            
            void content.offsetWidth; 
            content.style.transition = 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            content.style.opacity = '1';
            content.style.transform = 'translateX(0) scale(1)';
            content.scrollTop = 0;
        }, 250);

        if(el) { document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
    }

                if (missingCount === 0) perfect.push(d);

    async function fetchWithRetry(url, options, retries = 3) {
        const delays = [1000, 2000, 4000]; 
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if(response.status === 401 || response.status === 402 || response.status === 403) { throw new Error('API_AUTH_ERROR'); }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                if (error.message === 'API_AUTH_ERROR') throw error;
                if (i === retries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }
    }

    window.callAIBartender = async function() {
        const input = document.getElementById('aiMoodInput').value.trim();
        if(!input) { showMsg("请先描述一下你的心情或场景哦！"); return; }
        
        if(!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY.length < 10) {
            showMsg("请先在代码第199行填入 DeepSeek API Key", false);
            return;
        }

        haptic('medium');
        const loadingModal = document.getElementById('aiLoadingModal');
        loadingModal.classList.remove('hidden');
        setTimeout(() => loadingModal.classList.remove('opacity-0'), 10);

        const systemPrompt = `You are a world-class mixologist with a poetic soul. 
        Create a totally unique, professional, and creative cocktail recipe tailored to the user's mood, story, or scene.
        Return ONLY a valid JSON object matching this EXACT schema, no markdown code blocks, no extra text:
        { "zh": "Creative Name in Chinese", "en": "Creative Name in English", "glass": "martini or rocks or highball or shot or flute or coupe", "abv": 20, "base": "琴酒 or 伏特加 or 威士忌 or 白兰地 or 朗姆酒 or 龙舌兰", "ingredients": ["材料A 45ml", "材料B 20ml", "冰块 适量"], "steps": ["专业步骤 1", "专业步骤 2", "专业步骤 3", "专业步骤 4", "专业步骤 5"], "flavors": [50, 60, 20, 40, 80], "tagline": "A poetic, moody sentence about this drink in Chinese", "aiDesc": "A brief, empathetic explanation in Chinese of why this specific cocktail perfectly fits their mood." }`;

        try {
            const result = await fetchWithRetry('https://api.deepseek.com/chat/completions', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` }, 
                body: JSON.stringify({ 
                    model: 'deepseek-chat',
                    messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: input }],
                    response_format: { type: 'json_object' }
                }) 
            });
            
            let textResponse = result.choices[0].message.content.trim();
            if (textResponse.startsWith('```json')) textResponse = textResponse.replace(/^```json/, '').replace(/```$/, '');
            else if (textResponse.startsWith('```')) textResponse = textResponse.replace(/^```/, '').replace(/```$/, '');
            
            const aiRecipe = JSON.parse(textResponse);

            const colorIdx = Math.floor(Math.random() * 15);
            const newCocktail = {
                id: 'diy_ai_' + Date.now(), zh: aiRecipe.zh + ' ✨', en: aiRecipe.en, glass: aiRecipe.glass || 'rocks', abv: aiRecipe.abv || 15, base: aiRecipe.base || "伏特加", ingredients: aiRecipe.ingredients, steps: aiRecipe.steps, flavors: aiRecipe.flavors || [40, 50, 40, 50, 50],
                palette: generatePalette(colorIdx), cardGrad: modernGradients[colorIdx], themeColor: solidColors[colorIdx], tagline: aiRecipe.tagline || "来自赛博空间的专属微醺", isAI: true, aiDesc: aiRecipe.aiDesc,
                saved: false, 
                reqCats: (() => { let cats = new Set(); (aiRecipe.ingredients||[]).forEach(ing => { cabinetItems.forEach(cat => { if(cat.kw.some(k => String(ing).includes(k))) cats.add(cat.name); }); }); cabinetItems.forEach(cat => { if(cat.kw.some(k => (aiRecipe.base || "伏特加").includes(k))) cats.add(cat.name); }); return cats; })()
            };
            cocktailDB.unshift(newCocktail); 
            
            loadingModal.classList.add('opacity-0');
            setTimeout(() => { loadingModal.classList.add('hidden'); showRandomModal(newCocktail); }, 300);
        } catch (error) {
            console.error(error); 
            loadingModal.classList.add('opacity-0');
            setTimeout(() => { 
                loadingModal.classList.add('hidden'); 
                if (error.message === 'API_AUTH_ERROR') showMsg("API Key 错误或余额不足！");
                else showMsg("网络异常或 AI 酒保太忙啦，稍后再试！");
            }, 300);
        }
    };

    window.saveDIYRecipe = function() {
        const zh = document.getElementById('diyZh').value.trim();
        const en = document.getElementById('diyEn').value.trim() || 'Custom Recipe';
        const base = document.getElementById('diyBase').value;
        const glass = document.getElementById('diyGlass').value;
        const abv = parseInt(document.getElementById('diyAbv').value) || 0;
        const ingText = document.getElementById('diyIng').value.trim();
        const stepText = document.getElementById('diySteps').value.trim();

        if (!zh || !ingText || !stepText) { showMsg('请填写完整的名称、材料和步骤！'); return; }

        const ingredients = ingText.split('\n').map(s => s.trim()).filter(s => s);
        const steps = stepText.split('\n').map(s => s.trim()).filter(s => s);

        let reqCats = new Set();
        ingredients.forEach(ing => { cabinetItems.forEach(cat => { if(cat.kw.some(k => ing.includes(k))) reqCats.add(cat.name); }); });
        cabinetItems.forEach(cat => { if(cat.kw.some(k => base.includes(k))) reqCats.add(cat.name); });

        let calcFlavors = [20, 20, 20, 20, 20]; 
        let ingStr = ingredients.join(' ');
        
        if (ingStr.match(/柠檬|青柠|酸/)) calcFlavors[0] = 75; else if (ingStr.match(/西柚|番茄/)) calcFlavors[0] = 45;
        if (ingStr.match(/糖|蜜|利口酒|可乐|雪碧|甜|百利/)) calcFlavors[1] = 70; else if (ingStr.match(/味美思|果汁/)) calcFlavors[1] = 45;
        if (ingStr.match(/苦精|金巴利|阿玛罗|咖啡|茶/)) calcFlavors[2] = 85; else if (ingStr.match(/柚|皮/)) calcFlavors[2] = 40;
        if (abv >= 30) calcFlavors[3] = 90; else if (abv >= 20) calcFlavors[3] = 70; else if (abv >= 10) calcFlavors[3] = 45; else calcFlavors[3] = 10;
        if (ingStr.match(/汁|果|樱桃|橙|菠萝|莓|柚/)) calcFlavors[4] = 85; else if (ingStr.match(/薄荷|玫瑰|花/)) calcFlavors[4] = 50;

        calcFlavors = calcFlavors.map(v => Math.min(100, Math.max(0, v + Math.floor(Math.random()*16 - 8))));

        const colorIdx = Math.floor(Math.random() * 15);
        const newCocktail = {
            id: 'diy_' + Date.now(), zh: zh, en: en, glass: glass, abv: abv, base: base, ingredients: ingredients, steps: steps, flavors: calcFlavors,
            palette: generatePalette(colorIdx), cardGrad: modernGradients[colorIdx], themeColor: solidColors[colorIdx], tagline: "我的专属定制微醺配方", reqCats: reqCats, saved: true
        };

        cocktailDB.unshift(newCocktail); 
        saveLocalData();
        
        haptic('success'); showMsg('配方创建成功！', true); closeDIYModal();
        switchPage('recipes', document.getElementById('tab-recipes')); 
    }

        } else {
            panel.classList.remove('opacity-100', 'scale-100'); panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            setTimeout(() => panel.classList.add('hidden'), 300);
        }
    };

    window.confirmDeleteDIY = function(id) {
        haptic('heavy');
        const idx = cocktailDB.findIndex(x => x.id === id);
        if(idx > -1) cocktailDB.splice(idx, 1);
        
        const favIdx = favoritedIds.indexOf(id);
        if(favIdx > -1) favoritedIds.splice(favIdx, 1);
        
        saveLocalData();
        showMsg('配方已彻底删除', true);
        closeRecipeDetail();
        
        setTimeout(() => {
            if(document.getElementById('recipeGrid')) renderListHTMLOnly();
            if(document.getElementById('cabinetContent')) renderCabinetHTMLOnly();
            const tabProfile = document.getElementById('tab-profile');
            if(tabProfile && tabProfile.classList.contains('active')) renderProfile();
        }, 300);
    };

    window.toggleStep = function(idx, totalLength, themeColor) {
        haptic('light');
        const drink = cocktailDB.find(x => x.id === currentDetailId);
        
        const inactiveBg = isLightMode ? '#E5E5EA' : '#121214';
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        const inactiveText = isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
        const inactiveAxis = isLightMode ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
        
        if(animTimer) {
            clearInterval(animTimer); animTimer = null;
            for(let i=0; i<totalLength; i++) {
                const el = document.getElementById(`step-item-${i}`);
                const textWrap = document.getElementById(`step-text-${i}`);
                const numBg = document.getElementById(`step-num-bg-${i}`);
                const num = document.getElementById(`step-num-${i}`);
                const axis = document.getElementById(`step-axis-${i}`);
                if(el && el.dataset.done === '0') { 
                    el.style.backgroundColor = ''; 
                    textWrap.classList.remove('text-white');
                    textWrap.classList.add('text-white/80');
                    numBg.style.backgroundColor = inactiveBg;
                    numBg.style.borderColor = inactiveBorder;
                    numBg.style.boxShadow = 'none';
                    num.style.color = inactiveText;
                    if(axis) axis.style.backgroundColor = inactiveAxis;
                }
            }
        }
        
        if(drink) {
            const st = document.getElementById('animationStage');
            if(st) st.innerHTML = renderStepSvg(drink, drink.steps[idx], idx);
        }
        
        const el = document.getElementById(`step-item-${idx}`);
        const textWrap = document.getElementById(`step-text-${idx}`);
        const numBg = document.getElementById(`step-num-bg-${idx}`);
        const num = document.getElementById(`step-num-${idx}`);
        const axis = document.getElementById(`step-axis-${idx}`);
        
        if (el.dataset.done === '1') {
            el.dataset.done = '0';
            textWrap.classList.remove('line-through', 'text-white/30');
            textWrap.classList.add('text-white/80');
            numBg.style.backgroundColor = inactiveBg;
            numBg.style.borderColor = inactiveBorder;
            numBg.style.boxShadow = 'none';
            num.style.color = inactiveText;
            if(axis) axis.style.backgroundColor = inactiveAxis;
        } else {
            el.dataset.done = '1';
            textWrap.classList.add('line-through', 'text-white/30');
            textWrap.classList.remove('text-white/80', 'text-white');
            numBg.style.backgroundColor = themeColor;
            numBg.style.borderColor = themeColor;
            numBg.style.boxShadow = `0 0 15px ${themeColor}80`;
            num.style.color = '#fff';
            if(axis) axis.style.backgroundColor = themeColor; 
        }
    };

    function startSim(drink) {
        if(animTimer) clearInterval(animTimer);
        let cur = 0;
        const inactiveBg = isLightMode ? '#E5E5EA' : '#121214';
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        const inactiveText = isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
        const inactiveAxis = isLightMode ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
        const activeBgFade = isLightMode ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)';
        
        const update = () => {
            const st = document.getElementById('animationStage'); if(!st) return;
            st.innerHTML = renderStepSvg(drink, drink.steps[cur], cur);
            for(let i=0; i<drink.steps.length; i++) {
                const el = document.getElementById(`step-item-${i}`);
                const textWrap = document.getElementById(`step-text-${i}`);
                const numBg = document.getElementById(`step-num-bg-${i}`);
                const num = document.getElementById(`step-num-${i}`);
                const axis = document.getElementById(`step-axis-${i}`);
                if(el && el.dataset.done === '0') { 
                    el.style.backgroundColor = i===cur ? activeBgFade : ''; 
                    textWrap.classList.toggle('text-white', i===cur);
                    textWrap.classList.toggle('text-white/80', i!==cur);
                    numBg.style.backgroundColor = i===cur ? drink.themeColor : inactiveBg;
                    numBg.style.borderColor = i===cur ? drink.themeColor : inactiveBorder;
                    numBg.style.boxShadow = i===cur ? `0 0 15px ${drink.themeColor}80` : 'none';
                    num.style.color = i===cur ? '#fff' : inactiveText;
                    if(axis) axis.style.backgroundColor = i===cur ? drink.themeColor : inactiveAxis;
                }
            }
            cur = (cur + 1) % drink.steps.length;
        };
        update(); animTimer = setInterval(update, 2400);
    }

    window.closeRecipeDetail = function() { 
        if(animTimer) clearInterval(animTimer); 
        const detail = document.getElementById('recipeDetail'); 
        detail.style.transform = ''; 
        detail.style.backgroundColor = '';
        detail.classList.remove('detail-show'); 
        detail.classList.add('translate-y-full'); 
        document.getElementById('mainWrapper').classList.remove('content-shrink'); 
        document.getElementById('bottomTab').style.transform = 'translateY(0)'; 
        const panel = document.getElementById('deleteMenuPanel');
        if(panel) {
            panel.classList.remove('opacity-100', 'scale-100');
            panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none', 'hidden');
        }
    }

    window.toggleFavorite = function() { 
        const idx = favoritedIds.indexOf(currentDetailId); 
        const d = cocktailDB.find(x => x.id === currentDetailId);
        if(idx>-1) { favoritedIds.splice(idx,1); haptic('light'); } 
        else { favoritedIds.push(currentDetailId); haptic('success'); } 
        saveLocalData();
        showMsg(idx>-1?'已移出典藏':'已加入典藏', idx===-1); 
        document.getElementById('detailFavBtn').innerText = favoritedIds.includes(currentDetailId)?'★':'☆'; 
        document.getElementById('detailFavBtn').style.color = favoritedIds.includes(currentDetailId) ? d.themeColor : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.4)'); 
    }
    
    window.shareRecipe = function() {
        haptic('medium');
        const d = cocktailDB.find(x => x.id === currentDetailId);
        const text = `🍸【${d.zh} ${d.en}】\n📊 酒精度: ${d.abv}%\n\n📝 配方清单:\n${d.ingredients.map(i => '- ' + formatVol(i)).join('\n')}\n\n👉 Cocktail Master 荣誉出品`;
        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showMsg('配方已复制，快去分享吧！', true);
    }

    window.toggleIngredient = function(el, themeColor, totalCount) {
        haptic('light'); 
        const c = el.querySelector('.chk'); 
        const svg = el.querySelector('svg');
        const textWrap = el.querySelector('.ing-text-wrap'); 
        
        if(c.dataset.checked === '1') {
            c.dataset.checked = '0';
            c.style.backgroundColor = 'transparent';
            c.style.borderColor = 'rgba(255,255,255,0.3)';
            svg.style.opacity = '0';
            textWrap.classList.remove('opacity-30', 'line-through');
        } else {
            c.dataset.checked = '1';
            c.style.backgroundColor = themeColor;
            c.style.borderColor = themeColor;
            svg.style.opacity = '1';
            textWrap.classList.add('opacity-30', 'line-through');
        }

        const checkedCount = document.querySelectorAll('.chk[data-checked="1"]').length;
        const counterEl = document.getElementById('ingCounter');
        const progressEl = document.getElementById('ingProgressBar');
        
        if (counterEl) { counterEl.innerText = checkedCount; if(checkedCount === totalCount) haptic('success'); }
        if (progressEl) { const percentage = (checkedCount / totalCount) * 100; progressEl.style.width = `${percentage}%`; }
    };

    function showMsg(m, success=false) { 
        const t=document.getElementById('toast'); 
        document.getElementById('toastText').innerText=m; 
        const icon = document.getElementById('toastIcon');
        if(success) { icon.classList.remove('hidden'); } else { icon.classList.add('hidden'); }
        t.classList.remove('hidden'); setTimeout(()=>t.classList.remove('opacity-0'),10); 
        setTimeout(()=>{ t.classList.add('opacity-0'); setTimeout(()=>t.classList.add('hidden'),300); },2000); 
    }

    let startY = 0, startX = 0, currentY = 0, isSwiping = false; 
    const detailEl = document.getElementById('recipeDetail');
    const detailContent = document.getElementById('detailContent');

    detailEl.addEventListener('touchstart', e => {
        if (detailContent.scrollTop > 5) return; 
        startY = e.touches[0].clientY; startX = e.touches[0].clientX; isSwiping = false; detailEl.style.transition = 'none'; 
    }, {passive: true});

    detailEl.addEventListener('touchmove', e => {
        if (detailContent.scrollTop > 5 || startY === 0) return;
        const touchY = e.touches[0].clientY, touchX = e.touches[0].clientX;
        let deltaY = touchY - startY, deltaX = touchX - startX;

        if (!isSwiping && Math.abs(deltaX) > Math.abs(deltaY)) { startY = 0; return; }
        
        isSwiping = true; currentY = touchY;

        if (deltaY > 0) {
            let dampedY = deltaY * (1 - (deltaY / (window.innerHeight * 2.5)));
            detailEl.style.transform = `translateY(${dampedY}px)`;
            let fadeOpacity = 1 - (deltaY / window.innerHeight);
            detailEl.style.backgroundColor = `rgba(0, 0, 0, ${Math.max(fadeOpacity, 0.2)})`;
        }
    }, {passive: false});

    detailEl.addEventListener('touchend', e => {
        if (startY === 0 || !isSwiping) return;
        let deltaY = currentY - startY;
        detailEl.style.transition = 'all 0.5s cubic-bezier(0.32, 0.72, 0, 1)'; 
        if (deltaY > 140) { haptic('light'); closeRecipeDetail(); } 
        else { if (!detailEl.classList.contains('translate-y-full')) { detailEl.style.transform = ''; detailEl.style.backgroundColor = ''; } }
        startY = 0; currentY = 0; startX = 0; isSwiping = false;
    });

    loadLocalData();
    window.onload = () => switchPage('recipes', document.getElementById('tab-recipes'));
</script>
</body>
</html>
