<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Cocktail Master - Spatial Native Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { ios: { red: '#FA2D48', blue: '#0A84FF', gold: '#D4AF37', gray: '#8E8E93', darkBg: '#050505', surface: '#151517' } } }
            }
        }
    </script>
    <style>
        body { background-color: #050505; margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .iphone { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; background: transparent; z-index: 10; }
        
        /* 动态极光环境背景 */
        .ambient-bg { position: fixed; inset: 0; z-index: 0; background: #050505; pointer-events: none; overflow: hidden; }
        .ambient-orb { position: absolute; border-radius: 50%; mix-blend-mode: screen; filter: blur(90px); animation: float-orb 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .ambient-orb-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: rgba(94, 92, 230, 0.15); }
        .ambient-orb-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: rgba(10, 132, 255, 0.15); animation-delay: -10s; animation-direction: alternate-reverse; }
        @keyframes float-orb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, 10vh) scale(1.2); } }

        .content-wrap { flex: 1; display: flex; flex-direction: column; height: 100%; transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1); position: relative; overflow: hidden; }
        .content-shrink { transform: scale(0.92) translateY(-10px); border-radius: 40px; opacity: 0.6; pointer-events: none; filter: blur(5px); }
        .content { flex: 1; overflow-y: auto; scroll-behavior: smooth; width: 100%; height: 100%; padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)); position: relative; z-index: 10; }
        
        .content::-webkit-scrollbar, .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 高级悬浮胶囊导航栏 */
        .tab-bar-container { 
            position: absolute; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: 6%; right: 6%; width: 88%; 
            display: flex; justify-content: space-around; align-items: center; z-index: 100; transition: transform 0.5s; 
            height: 64px; border-radius: 32px;
            backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); 
            background: rgba(30, 30, 32, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.05); 
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #777; cursor: pointer; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); font-weight: 600; transform-origin: center; height: 100%; }
        .tab-item:active { transform: scale(0.9); opacity: 0.7; }
        .tab-item.active { color: #fff; transform: scale(1.05); font-weight: 800; }
        .tab-item.active svg { filter: drop-shadow(0 2px 10px rgba(255,255,255,0.4)); }
        .tab-item svg { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); color: inherit; }

        /* Spatial UI 质感卡片核心 */
        .glass-card {
            background: rgba(26, 26, 28, 0.6);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255,255,255,0.04);
            border-radius: 28px;
        }

        .large-title { font-size: 38px; font-weight: 900; padding: 60px 24px 10px 24px; letter-spacing: -1px; color: white; transition: all 0.3s ease; display: flex; flex-direction: column; }

        #recipeDetail { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; background: #0A0A0C; }
        .detail-show .detail-inner { opacity: 1; transform: translateY(0); }
        .detail-inner { transition: all 0.4s ease 0.1s; opacity: 0; transform: translateY(30px); }

        .ing-tag { border: 1px solid rgba(255,255,255,0.08); color: #888; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); background: rgba(255,255,255,0.04); white-space: nowrap; }
        .ing-tag:active { transform: scale(0.92); }
        .ing-tag.selected { background: #FA2D48; color: #fff; border-color: #FA2D48; transform: scale(1.05); box-shadow: 0 4px 15px rgba(250,45,72,0.4); font-weight: 800; }

        @keyframes stagger-fade-in { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .stagger-item { opacity: 0; animation: stagger-fade-in 0.6s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

        /* Animation Keyframes */
        @keyframes pour-action { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
        @keyframes muddle-action { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
        @keyframes shake-action { 0%, 100% { transform: translate(0,0) rotate(0deg); } 25% { transform: translate(2px,-2px) rotate(5deg); } 75% { transform: translate(-2px,2px) rotate(-5deg); } }
        @keyframes item-fall { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes spin-stir { 0% { transform: scaleX(1); } 50% { transform: scaleX(-1); } 100% { transform: scaleX(1); } }
        @keyframes flame-flicker { 0%, 100% { transform: scale(1) skewX(0deg); opacity: 0.9; } 50% { transform: scale(1.1) skewX(-5deg); opacity: 1; } }
        @keyframes rim-glow { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 3px white); } }
        @keyframes wipe-wedge { 0% { transform: translate(var(--startX), var(--y)) rotate(-25deg); } 100% { transform: translate(var(--endX), var(--y)) rotate(25deg); } }
        @keyframes vigorous-shake { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 10% { transform: translate(-5px, -5px) rotate(-15deg); } 20% { transform: translate(5px, 5px) rotate(15deg); } 30% { transform: translate(-5px, 5px) rotate(-15deg); } 40% { transform: translate(5px, -5px) rotate(15deg); } 50% { transform: translate(-5px, -5px) rotate(-15deg); } 60% { transform: translate(5px, 5px) rotate(15deg); } 70% { transform: translate(-5px, 5px) rotate(-15deg); } 80% { transform: translate(5px, -5px) rotate(15deg); } 90% { transform: translate(-5px, -5px) rotate(-15deg); } }

        .anim-pour-line { stroke-dasharray: 4 4; animation: pour-action 0.3s infinite linear; }
        .anim-muddler { animation: muddle-action 0.4s infinite ease-in-out; }
        .anim-shaker { transform-origin: 32px 32px; animation: shake-action 0.2s infinite; }
        .anim-vigorous-shake { animation: vigorous-shake 0.4s infinite ease-in-out; transform-origin: center; }
        .anim-item-fall { animation: item-fall 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .anim-stir { animation: spin-stir 1s infinite ease-in-out; transform-origin: 32px center; }
        .anim-flame { animation: flame-flicker 0.15s infinite alternate; transform-origin: 32px 20px; }
        .anim-pour-bounce { animation: muddle-action 0.8s infinite ease-in-out; }
        .anim-rim-glow { animation: rim-glow 0.8s infinite alternate ease-in-out; }
        .anim-wipe-wedge { animation: wipe-wedge 1.2s infinite alternate ease-in-out; }
        
        .font-art { font-family: "Songti SC", "Noto Serif CJK SC", "STSong", "PT Serif", serif; }

        /* --- 白天模式极致适配 --- */
        body.light .ambient-bg { background: #F2F2F7; }
        body.light .ambient-orb-1 { background: rgba(94, 92, 230, 0.08); }
        body.light .ambient-orb-2 { background: rgba(10, 132, 255, 0.08); }
        
        body.light .text-white, body.light .large-title { color: #000; }
        body.light .text-white\/40 { color: rgba(0,0,0,0.4); }
        body.light .text-white\/50 { color: rgba(0,0,0,0.5); }
        body.light .text-white\/70 { color: rgba(0,0,0,0.7); }
        body.light .text-white\/80 { color: rgba(0,0,0,0.8); }
        body.light .text-white\/90 { color: rgba(0,0,0,0.9); }
        
        body.light .glass-card { background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); }
        body.light .glass-card .text-white, body.light #randomCardWrap .text-white { color: #000; }
        
        body.light .tab-bar-container { background: rgba(255, 255, 255, 0.75); border-color: rgba(0,0,0,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        body.light .tab-item { color: #888; }
        body.light .tab-item.active { color: #000; }
        
        body.light .bg-black\/30 { background-color: rgba(0,0,0,0.05); }
        body.light .bg-black\/40 { background-color: rgba(0,0,0,0.08); }
        body.light .bg-white\/5 { background-color: rgba(0,0,0,0.03); }
        body.light .bg-white\/10 { background-color: rgba(0,0,0,0.06); }
        body.light .border-white\/5 { border-color: rgba(0,0,0,0.05); }
        body.light .border-white\/10 { border-color: rgba(0,0,0,0.1); }
        
        body.light svg text { fill: #000 !important; }
        body.light svg line[stroke="rgba(255,255,255,0.2)"] { stroke: rgba(0,0,0,0.1) !important; }
        body.light svg polygon[stroke="rgba(255,255,255,0.15)"] { stroke: rgba(0,0,0,0.1) !important; }
        body.light svg path[stroke="rgba(255,255,255,0.7)"] { stroke: rgba(0,0,0,0.8) !important; }
        body.light #animationStage svg path[stroke="white"], body.light #animationStage svg line[stroke="white"] { stroke: rgba(0,0,0,0.8) !important; }
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.8)"] { fill: rgba(0,0,0,0.2) !important; }
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.7)"] { fill: rgba(0,0,0,0.3) !important; }
        body.light #animationStage svg path[fill="rgba(255,255,255,0.2)"] { fill: rgba(0,0,0,0.1) !important; }
        
        body.light #diyModal input, body.light #diyModal textarea, body.light #diyModal select { color: #000; }
        body.light #diyModal select option { background: #fff; color: #000; }
        body.light #toast { background: rgba(255,255,255,0.95); color: #000; border-color: rgba(0,0,0,0.1); }
        body.light #recipeDetail { background: #F2F2F7; }
    </style>
</head>

    window.getGlassSvgCover = function(glass, color) {
        let path = '', liquid = '';
        switch(glass) {
            case 'martini': path = 'M 10 15 L 32 40 L 54 15 Z M 32 40 L 32 56 M 22 56 L 42 56'; liquid = 'M 14 20 L 32 40 L 50 20 Z'; break;
            case 'rocks': path = 'M 18 20 L 22 56 L 42 56 L 46 20 Z'; liquid = 'M 20 30 L 22 54 L 42 54 L 44 30 Z'; break;
            case 'highball': path = 'M 22 10 L 22 56 L 42 56 L 42 10 Z'; liquid = 'M 22 25 L 22 54 L 42 54 L 42 25 Z'; break;
            case 'coupe': path = 'M 10 18 C 10 40, 54 40, 54 18 M 32 38 L 32 56 M 22 56 L 42 56'; liquid = 'M 12 23 C 18 36, 46 36, 52 23 Z'; break;
            default: path = 'M 18 20 L 22 56 L 42 56 L 46 20 Z'; liquid = 'M 20 30 L 22 54 L 42 54 L 44 30 Z'; break;
        }
        return `<svg viewBox="0 0 64 64" class="w-full h-full"><path d="${liquid}" fill="${color}" opacity="0.75"/><path d="${path}" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="${liquid}" fill="url(#gloss)" opacity="0.5"/><defs><linearGradient id="gloss" x1="0%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="white" stop-opacity="0.6"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient></defs></svg>`;
    };

    function getRadarSvg(flavors, color) {
        const rMax = 35;
        const pts = flavors.map((f, i) => { const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (f/100)*rMax*Math.cos(angle)},${50 - (f/100)*rMax*Math.sin(angle)}`; }).join(' ');
        let bgWeb = [100, 75, 50, 25].map(p => {
            let str = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (p/100)*rMax*Math.cos(angle)},${50 - (p/100)*rMax*Math.sin(angle)}`; }).join(' ');
            return `<polygon points="${str}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
        }).join('');
        let axes = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<line x1="50" y1="50" x2="${50+rMax*Math.cos(angle)}" y2="${50-rMax*Math.sin(angle)}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`; }).join('');
        let texts = ['酸', '甜', '苦', '烈', '果香'].map((l,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<text x="${50+42*Math.cos(angle)}" y="${50-42*Math.sin(angle)+2}" fill="white" font-size="11" font-weight="900" text-anchor="middle" dominant-baseline="middle" opacity="0.9">${l}</text>`; }).join('');
        return `<svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">${bgWeb}${axes}<polygon points="${pts}" fill="${color}" opacity="0.65" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${texts}</svg>`;
    }

    window.renderStepSvg = function(drink, stepText, idx) {
        let conf;
        switch(drink.glass) {
            case 'martini': conf = { path: 'M 10 15 L 32 40 L 54 15 Z M 32 40 L 32 56 M 22 56 L 42 56', clip: 'M 10 15 L 32 40 L 54 15 Z', topY: 15, bottomY: 40, rim: {x1: 10, x2: 54}, ice: [{x: 29, y: 30, size: 6}], stir: {x1: 42, y1: 5, x2: 32, y2: 38}, garnish: {x: 44, y: 15}, muddle: null }; break;
            case 'rocks': conf = { path: 'M 18 20 L 22 56 L 42 56 L 46 20 Z', clip: 'M 18 20 L 22 56 L 42 56 L 46 20 Z', topY: 20, bottomY: 56, rim: {x1: 18, x2: 46}, ice: [{x: 22, y: 44, size: 10}, {x: 32, y: 44, size: 10}, {x: 27, y: 34, size: 10}], stir: {x1: 44, y1: 8, x2: 26, y2: 54}, garnish: {x: 44, y: 20}, muddle: {x: 32, y: 20, w: 6, h: 36} }; break;
            case 'highball': conf = { path: 'M 22 10 L 22 56 L 42 56 L 42 10 Z', clip: 'M 22 10 L 22 56 L 42 56 L 42 10 Z', topY: 10, bottomY: 56, rim: {x1: 22, x2: 42}, ice: [{x: 28, y: 46, size: 8}, {x: 28, y: 36, size: 8}, {x: 28, y: 26, size: 8}], stir: {x1: 46, y1: 2, x2: 28, y2: 54}, garnish: {x: 42, y: 10}, muddle: {x: 32, y: 10, w: 6, h: 46} }; break;
            case 'coupe': default: conf = { path: 'M 10 18 C 10 40, 54 40, 54 18 M 32 38 L 32 56 M 22 56 L 42 56', clip: 'M 10 18 C 10 40, 54 40, 54 18 Z', topY: 18, bottomY: 38, rim: {x1: 10, x2: 54}, ice: [{x: 28, y: 28, size: 8}], stir: {x1: 46, y1: 6, x2: 32, y2: 36}, garnish: {x: 48, y: 18}, muddle: null }; break;
        }

        let frontElements = ''; let clippedItems = ''; 
        let themeC = drink.themeColor || 'white';
        let ratio = Math.max(0.05, (idx + 1) / drink.steps.length);
        let currentY = conf.bottomY - ((conf.bottomY - conf.topY) * ratio);

        if(/摇晃|干摇/.test(stepText)) {
            return `<svg viewBox="0 0 64 64" class="w-full h-full overflow-visible"><g class="anim-shaker"><path d="M 22 25 L 24 52 C 24 56, 40 56, 40 52 L 42 25 Z" fill="${themeC}" opacity="0.3"/><path d="M 22 25 L 24 52 C 24 56, 40 56, 40 52 L 42 25 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><path d="M 20 25 L 44 25 L 38 12 L 26 12 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><path d="M 26 12 C 26 6, 38 6, 38 12" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></g></svg>`;
        }
        if(/方糖|糖块|冰块|加冰|老冰/.test(stepText)) {
            conf.ice.forEach((ice, i) => { clippedItems += `<rect x="${ice.x}" y="${ice.y}" width="${ice.size}" height="${ice.size}" rx="2" fill="rgba(255,255,255,0.8)" class="anim-item-fall" style="animation-delay: ${i*0.1}s"/>`; });
        }
        let stirrerHtml = '';
        if(/搅拌|Rolling|混合/.test(stepText)) { stirrerHtml = `<line x1="${conf.stir.x1}" y1="${conf.stir.y1}" x2="${conf.stir.x2}" y2="${conf.stir.y2}" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" class="anim-stir"/>`; }
        if(/倒|注|补满|浮/.test(stepText)) {
            frontElements += `<g transform="translate(32, -5)"><path d="M -4 5 L -8 15 L 8 15 L 4 5 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" stroke-linejoin="round" class="anim-pour-bounce"/><line x1="0" y1="15" x2="0" y2="${currentY + 5}" stroke="${themeC}" stroke-width="2.5" stroke-linecap="round" class="anim-pour-line" stroke-dasharray="6 4"/></g>`;
        }

        return `<svg viewBox="0 0 64 64" class="w-full h-full overflow-visible">
            <defs><clipPath id="c_${drink.id}"><path d="${conf.clip}"/></clipPath></defs>
            ${stirrerHtml}
            <g clip-path="url(#c_${drink.id})">
                <rect x="0" y="${currentY}" width="64" height="64" fill="${themeC}" opacity="0.5" class="transition-all duration-700 ease-in-out"/>
                <line x1="0" y1="${currentY}" x2="64" y2="${currentY}" stroke="${themeC}" stroke-width="1.5" opacity="0.8" class="transition-all duration-700 ease-in-out"/>
                ${clippedItems}
            </g>
            <path d="${conf.path}" fill="none" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
            ${frontElements}
        </svg>`;
    }

    window.startSim = function(drink) {
        if(animTimer) clearInterval(animTimer);
        let cur = 0;
        const inactiveBg = isLightMode ? '#E5E5EA' : '#121214';
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        const inactiveText = isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
        const activeBgFade = isLightMode ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)';
        
        const update = () => {
            requestAnimationFrame(() => {
                const st = document.getElementById('animationStage'); if(!st) return;
                st.innerHTML = window.renderStepSvg(drink, drink.steps[cur], cur);
                
                for(let i=0; i<drink.steps.length; i++) {
                    const el = document.getElementById(`step-item-${i}`);
                    if(!el || el.dataset.done === '1') continue;
                    
                    el.style.backgroundColor = i===cur ? activeBgFade : ''; 
                    const txtWrap = el.querySelector('.step-text');
                    const numBg = el.querySelector('.step-num-bg');
                    const num = el.querySelector('.step-num');
                    
                    if (i === cur) {
                        txtWrap.classList.add('text-white'); txtWrap.classList.remove('text-white/80');
                        numBg.style.backgroundColor = drink.themeColor;
                        numBg.style.borderColor = drink.themeColor;
                        numBg.style.boxShadow = `0 0 15px ${drink.themeColor}80`;
                        num.style.color = '#fff';
                    } else {
                        txtWrap.classList.remove('text-white'); txtWrap.classList.add('text-white/80');
                        numBg.style.backgroundColor = inactiveBg;
                        numBg.style.borderColor = inactiveBorder;
                        numBg.style.boxShadow = 'none';
                        num.style.color = inactiveText;
                    }
                }
                cur = (cur + 1) % drink.steps.length;
            });
        };
        update(); animTimer = setInterval(update, 2200);
    }

                        <div class="absolute inset-0 z-0 opacity-15 pointer-events-none" style="background: ${d.palette}"></div>
                        <div class="w-[60px] h-[60px] mb-3 relative z-10 drop-shadow-lg">${window.getGlassSvgCover(d.glass, d.themeColor)}</div>
                        <div class="z-10 flex flex-col items-center text-center w-full px-1">
                            <div class="text-[15px] font-bold text-white tracking-tight leading-tight truncate w-full">${d.zh}</div>
                            <div class="text-[10px] text-[#D4AF37] mt-1 drop-shadow-md tracking-widest">${'★'.repeat(tastingNotes[d.id].rating || 0)}</div>
                        </div>
                    </div>
                `).join('') : `<div class="col-span-2 text-center text-white/30 py-6">暂无记录，快去给喜欢的酒打个分吧。</div>`}
            </div>
        `;
    }

    window.toggleTheme = () => { isLightMode = !isLightMode; document.body.classList.toggle('light', isLightMode); saveLocalData(); renderProfile(); };
    window.toggleUnit = () => { isOz = !isOz; saveLocalData(); renderProfile(); };

    // ==========================================
    // 4. 详情页交互与动画控制
    // ==========================================
    window.openDetail = function(id) {
        currentDetailId = String(id); haptic('light');
        const d = cocktailDB.find(x => String(x.id) === currentDetailId); 
        const detail = document.getElementById('recipeDetail');
        const note = tastingNotes[id] || { rating: 0, note: '' };
        tempRating = note.rating || 0;

        const isFav = favoritedIds.includes(currentDetailId);
        const favColor = isFav ? d.themeColor : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.4)');

        document.getElementById('detailNavRight').innerHTML = `
            <button onclick="shareRecipe()" class="w-10 h-10 flex items-center justify-center glass-card interactive-btn rounded-full text-lg">🔗</button>
            <button id="detailFavBtn" class="text-3xl interactive-btn drop-shadow-[0_0_15px_rgba(250,45,72,0.4)] ml-4 mr-2" style="color: ${favColor}" onclick="toggleFavorite()">★</button>
        `;

        const ingredientsHtml = d.ingredients.map((ingString, index) => {
            let parts = ingString.split(' ');
            let nameZh = parts[0];
            let amount = parts.length > 1 ? parts.slice(1).join(' ') : '适量';
            let borderClass = index === d.ingredients.length - 1 ? '' : 'border-b border-white/5';

            return `
            <div class="flex items-center justify-between py-4 ${borderClass} cursor-pointer active:opacity-70 transition-opacity" 
                 onclick="toggleIngredient(this, '${d.themeColor}', ${d.ingredients.length})">
                <div class="flex items-center w-full">
                    <div class="chk w-[22px] h-[22px] rounded-full border border-white/20 mr-4 flex-shrink-0 flex items-center justify-center transition-all duration-300" data-checked="0">
                        <svg viewBox="0 0 24 24" class="w-3.5 h-3.5 text-white opacity-0 fill-current transition-opacity duration-300"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                    </div>
                    <div class="ing-text-wrap flex justify-between items-center w-full transition-all duration-300">
                        <span class="text-[16px] font-bold text-white/90 mr-2 tracking-wide">${nameZh}</span>
                        <span class="text-[15px] font-mono text-white/40 flex-shrink-0">${formatVol(amount)}</span>
                    </div>
                </div>
            </div>`;
        }).join('');

        let stepsHtml = d.steps.map((s, i) => `
            <div class="relative flex items-start py-4 cursor-pointer active:opacity-70 transition-opacity" data-done="0" id="step-item-${i}" onclick="toggleStep(this, '${d.themeColor}', ${d.steps.length})">
                <div class="step-num-bg relative z-10 w-7 h-7 rounded-full border flex flex-shrink-0 items-center justify-center mr-4 mt-0.5 transition-all duration-300 shadow-sm" style="background-color: ${isLightMode ? '#E5E5EA' : '#121214'}; border-color: ${isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)'}">
                    <span class="step-num font-black text-[12px] transition-colors duration-300" style="color: ${isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)'}">${i+1}</span>
                </div>
                <div class="flex-1 pb-2">
                    <span class="step-text text-[15px] font-bold leading-[1.6] tracking-wide text-white/80 transition-all duration-300">${s}</span>
                </div>
            </div>
        `).join('');

        let starsHtml = [1,2,3,4,5].map(i => `<span id="star-${i}" onclick="setRating('${d.id}', ${i})" class="text-3xl cursor-pointer active:scale-75 transition-transform" style="color: ${i<=tempRating?'#D4AF37':'rgba(255,255,255,0.1)'}">${i<=tempRating?'★':'☆'}</span>`).join('');

        document.getElementById('detailContent').innerHTML = `
            <div class="mt-8 mb-10 text-center drop-shadow-2xl text-white relative z-10">
                <div class="text-[44px] font-black leading-tight tracking-tighter">${d.zh}</div>
                <div class="text-[12px] font-bold text-white/40 uppercase tracking-[0.5em] mt-3">${d.en}</div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-10 text-white min-h-[220px]">
                <div class="glass-card rounded-[24px] flex flex-col items-center justify-center relative overflow-hidden col-span-1 row-span-2 border-0">
                    <span class="absolute top-4 left-4 text-[10px] font-bold text-white/40 uppercase tracking-widest z-10">Craft</span>
                    <div id="animationStage" class="w-[60%] h-[60%] mt-6 relative z-10 transform transition-transform duration-500"></div>
                </div>
                <div class="glass-card rounded-[20px] flex flex-col justify-end relative overflow-hidden flex-1 p-5 border-0">
                    <span class="absolute top-4 left-4 text-[10px] font-bold text-white/40 uppercase tracking-widest z-10">ABV</span>
                    <div class="text-[36px] font-black leading-none drop-shadow-md relative z-10 mt-5" style="color: ${d.themeColor}">${d.abv}<span class="text-[14px] opacity-60 ml-0.5 text-white">%</span></div>
                </div>
                <div class="glass-card rounded-[20px] col-span-1 p-3 flex flex-col items-center justify-center border-0 relative">
                    <span class="absolute top-3 left-4 text-[10px] font-bold text-white/40 uppercase tracking-widest z-10">Flavor</span>
                    <div class="w-full h-full p-2 relative z-10 drop-shadow-md mt-4 flex items-center justify-center">
                        ${getRadarSvg(d.flavors, d.themeColor)}
                    </div>
                </div>
            </div>

            <div class="mb-12 text-white">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xl font-black text-white">材料清单</span>
                    <div class="text-[15px] font-black font-mono text-white/40 flex items-center glass-card px-3 py-1 rounded-full border-0">
                        <span id="ingCounter" style="color: ${d.themeColor}; transition: color 0.3s;">0</span><span class="mx-1.5 opacity-50">/</span>${d.ingredients.length}
                    </div>
                </div>
                <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden mb-6">
                    <div id="ingProgressBar" class="h-full w-0 transition-all duration-500 ease-out rounded-full" style="background-color: ${d.themeColor}; box-shadow: 0 0 10px ${d.themeColor};"></div>
                </div>
                <div class="glass-card rounded-[24px] overflow-hidden border-0 px-5">
                    ${ingredientsHtml}
                </div>
            </div>

            <div class="mb-10 text-white">
                <div class="flex items-center mb-4">
                    <span class="text-xl font-black text-white">制作方法</span>
                </div>
                <div class="glass-card rounded-[24px] overflow-hidden px-5 py-2 relative border-0">
                    ${stepsHtml}
                </div>
            </div>
            
            <div class="mb-20 text-white">
                <div class="flex items-center mb-4">
                    <span class="text-xl font-black text-white">专属品鉴笔记</span>
                </div>
                <div class="glass-card rounded-[24px] p-6 relative overflow-hidden flex flex-col gap-4 border-0">
                    <div class="flex justify-between items-center relative z-10">
                        <span class="text-[13px] font-bold text-white/50 tracking-wider uppercase">打个分数</span>
                        <div class="flex gap-1" id="starContainer">${starsHtml}</div>
                    </div>
                    <textarea id="noteInput" rows="3" class="w-full bg-black/40 rounded-[16px] p-5 text-[15px] outline-none border border-white/5 mb-2 h-28 text-white/90 shadow-inner relative z-10 transform translateZ(0)" placeholder="记录微调心得或品鉴感受...">${escapeHTML(note.note || '')}</textarea>
                    <button onclick="saveNote('${d.id}')" class="w-full py-4 bg-white/10 text-white rounded-[16px] font-bold text-lg active:scale-95 transition-transform shadow-md hover:bg-white/20 border border-white/10 relative z-10 interactive-btn">保存笔记</button>
                </div>
            </div>
        `;
        
        // 性能优化：将动画触发延后至帧重绘完成之后
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                detail.classList.remove('translate-y-full'); 
                detail.classList.add('detail-show');
                document.getElementById('mainWrapper').classList.add('content-shrink');
                document.getElementById('bottomTab').style.transform = 'translateY(120px)';
                
                setTimeout(() => { window.startSim(d); }, 400);
            });
        });
    }

    window.closeRecipeDetail = function() { 
        if(animTimer) clearInterval(animTimer); 
        const detail = document.getElementById('recipeDetail'); 
        detail.classList.remove('detail-show'); detail.classList.add('translate-y-full'); 
        document.getElementById('mainWrapper').classList.remove('content-shrink'); 
        document.getElementById('bottomTab').style.transform = 'translateY(0)'; 
        const act = document.querySelector('.tab-item.active');
        if(act && act.id === 'tab-profile') renderProfile();
    }

    window.toggleFavorite = function() { 
        haptic('light');
        if (!currentDetailId) return;
        const targetId = String(currentDetailId);
        const idx = favoritedIds.indexOf(targetId); 
        const d = cocktailDB.find(x => String(x.id) === targetId);
        
        if(idx > -1) { favoritedIds.splice(idx, 1); } else { favoritedIds.push(targetId); haptic('success'); } 
        saveLocalData();
        showMsg(idx > -1 ? '已移出典藏' : '✨ 已加入典藏', idx === -1); 
        
        const favBtn = document.getElementById('detailFavBtn');
        if (favBtn) {
            favBtn.innerText = favoritedIds.includes(targetId) ? '★' : '☆'; 
            favBtn.style.color = favoritedIds.includes(targetId) ? (d ? d.themeColor : '#FA2D48') : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.4)'); 
        }
    }
    
    window.shareRecipe = function() {
        haptic('medium');
        const d = cocktailDB.find(x => String(x.id) === String(currentDetailId));
        if(!d) return;
        const text = `🍸【${d.zh} ${d.en}】\n📊 酒精度: ${d.abv}%\n\n📝 配方清单:\n${d.ingredients.map(i => '- ' + formatVol(i)).join('\n')}\n\n👉 Cocktail Master 荣誉出品`;
        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showMsg('配方已复制，快去分享吧！', true);
    }

    window.toggleIngredient = function(el, themeColor, totalCount) {
        haptic('light'); 
        const c = el.querySelector('.chk'), svg = el.querySelector('svg'), txt = el.querySelector('.ing-text-wrap'); 
        if(!c || !svg || !txt) return;
        
        const active = c.dataset.checked === '1';
        c.dataset.checked = active ? '0' : '1';
        c.style.backgroundColor = active ? 'transparent' : themeColor;
        c.style.borderColor = active ? 'rgba(255,255,255,0.2)' : themeColor;
        svg.style.opacity = active ? '0' : '1';
        txt.classList.toggle('opacity-30', !active);
        txt.classList.toggle('line-through', !active);

        const checkedCount = document.querySelectorAll('.chk[data-checked="1"]').length;
        const counterEl = document.getElementById('ingCounter');
        const progressEl = document.getElementById('ingProgressBar');
        
        if (counterEl) { counterEl.innerText = checkedCount; if(totalCount && checkedCount === totalCount) haptic('success'); }
        if (progressEl && totalCount) { progressEl.style.width = `${(checkedCount / totalCount) * 100}%`; }
    };

    window.toggleStep = function(el, themeColor, totalLength) {
        haptic('light');
        const isDone = el.dataset.done === '1';
        el.dataset.done = isDone ? '0' : '1';
        const numBg = el.querySelector('.step-num-bg'), num = el.querySelector('.step-num'), txt = el.querySelector('.step-text');
        
        if (isDone) {
            numBg.style.backgroundColor = isLightMode ? '#E5E5EA' : '#121214';
            numBg.style.borderColor = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
            numBg.style.boxShadow = 'none';
            num.style.color = isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
            txt.classList.remove('line-through', 'text-white/30');
            txt.classList.add('text-white/80');
        } else {
            numBg.style.backgroundColor = themeColor;
            numBg.style.borderColor = themeColor;
            numBg.style.boxShadow = `0 0 15px ${themeColor}80`;
            num.style.color = '#fff';
            txt.classList.add('line-through', 'text-white/30');
            txt.classList.remove('text-white/80');
        }
        
        if(!isDone && currentDetailId) {
            const drink = cocktailDB.find(x => String(x.id) === currentDetailId);
            if(drink) {
                if(animTimer) clearInterval(animTimer);
                const st = document.getElementById('animationStage');
                const idx = parseInt(el.id.replace('step-item-', ''));
                if(st) st.innerHTML = window.renderStepSvg(drink, drink.steps[idx] || "", idx);
                setTimeout(() => window.startSim(drink), 2200);
            }
        }
    };

    window.setRating = function(id, idx) {
        haptic('light');
        tempRating = (tempRating === idx) ? 0 : idx;
        for(let i=1; i<=5; i++) {
            const s = document.getElementById('star-'+i);
            if(s) {
                s.innerText = i <= tempRating ? '★' : '☆';
                s.style.color = i <= tempRating ? '#D4AF37' : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)');
                s.style.textShadow = i <= tempRating ? '0 0 10px rgba(212,175,55,0.5)' : 'none';
            }
        }
    }

    window.saveNote = function(id) {
        haptic('success');
        const noteText = document.getElementById('noteInput') ? document.getElementById('noteInput').value.trim() : '';
        if(!tastingNotes[id]) tastingNotes[id] = { rating: 0, note: '' };
        tastingNotes[id].rating = tempRating;
        tastingNotes[id].note = noteText;
        saveLocalData();
        showMsg('📝 专属品鉴笔记已保存！', true);
    }

    // --- 5. 下拉关闭手势 ---
    let startY = 0, startX = 0, currentY = 0, isSwiping = false; 
    const detailEl = document.getElementById('recipeDetail');
    if (detailEl) {
        detailEl.addEventListener('touchstart', e => {
            const detailContent = document.getElementById('detailContent');
            if (detailContent && detailContent.scrollTop > 5) return; 
            if(e.target.closest('textarea') || e.target.closest('.interactive-btn')) return;
            startY = e.touches[0].clientY; startX = e.touches[0].clientX; isSwiping = false; detailEl.style.transition = 'none'; 
        }, {passive: true});

        detailEl.addEventListener('touchmove', e => {
            const detailContent = document.getElementById('detailContent');
            if ((detailContent && detailContent.scrollTop > 5) || startY === 0) return;
            const touchY = e.touches[0].clientY, touchX = e.touches[0].clientX;
            let deltaY = touchY - startY, deltaX = touchX - startX;
            if (!isSwiping && Math.abs(deltaX) > Math.abs(deltaY)) { startY = 0; return; }
            isSwiping = true; currentY = touchY;
            if (deltaY > 0) {
                let dampedY = deltaY * (1 - (deltaY / (window.innerHeight * 2.5)));
                detailEl.style.transform = `translateY(${dampedY}px)`;
            }
        }, {passive: false});

        detailEl.addEventListener('touchend', e => {
            if (startY === 0 || !isSwiping) return;
            let deltaY = currentY - startY;
            detailEl.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)'; 
            if (deltaY > 150) { haptic('light'); window.closeRecipeDetail(); } 
            else { if (!detailEl.classList.contains('translate-y-full')) detailEl.style.transform = ''; }
            startY = 0; currentY = 0; startX = 0; isSwiping = false;
        });
    }

    // --- 6. 启动初始化 ---
    loadLocalData();
    window.onload = () => window.switchPage('recipes', document.getElementById('tab-recipes'));
    
</script>
</body>
</html>
