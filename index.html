<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Cocktail Master - Spatial Native Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { ios: { red: '#FA2D48', blue: '#0A84FF', gold: '#D4AF37', gray: '#8E8E93', darkBg: '#000000', surface: '#0C0C0E' } } }
            }
        }
    </script>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent !important; 
            -webkit-touch-callout: none; 
            outline: none !important; 
        }
        html, body { 
            -webkit-user-select: none; 
            user-select: none; 
        }
        input, textarea { 
            -webkit-user-select: auto; 
            user-select: auto; 
        }
        body { background-color: #000000; margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .iphone { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; background: transparent; z-index: 10; }
        
        /* 动态极光环境背景 - 颜色加深加深对比度 */
        .ambient-bg { position: fixed; inset: 0; z-index: 0; background: #000000; pointer-events: none; overflow: hidden; }
        .ambient-orb { position: absolute; border-radius: 50%; mix-blend-mode: screen; filter: blur(70px); animation: float-orb 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .ambient-orb-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: rgba(94, 92, 230, 0.18); }
        .ambient-orb-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: rgba(10, 132, 255, 0.18); animation-delay: -10s; animation-direction: alternate-reverse; }
        @keyframes float-orb { 0% { transform: translate3d(0, 0, 0) scale(1); } 100% { transform: translate3d(10vw, 10vh, 0) scale(1.2); } }

        .content-wrap { flex: 1; display: flex; flex-direction: column; height: 100%; transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1); position: relative; overflow: hidden; will-change: transform, opacity; }
        .content-shrink { transform: scale(0.92) translate3d(0, -10px, 0); border-radius: 40px; opacity: 0.4; pointer-events: none; }
        .content { flex: 1; overflow-y: auto; scroll-behavior: smooth; width: 100%; height: 100%; padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)); position: relative; z-index: 10; }
        
        .content::-webkit-scrollbar, .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 高级悬浮胶囊导航栏 */
        @keyframes tab-haptic-pop {
            0% { transform: translateY(0) scale(1); }
            35% { transform: translateY(3px) scale(0.965); }
            100% { transform: translateY(0) scale(1); }
        }
        #bottomTab.haptic-tab-bump { animation: tab-haptic-pop 0.24s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .tab-bar-container { 
            position: absolute; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: 6%; right: 6%; width: 88%; 
            display: flex; justify-content: space-around; align-items: center; z-index: 100; transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); 
            height: 64px; border-radius: 32px;
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); 
            background: rgba(18, 18, 20, 0.7); border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.08); 
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #888; cursor: pointer; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s; font-weight: 600; height: 100%; }
        .tab-item:active { transform: scale(0.9); opacity: 0.7; }
        .tab-item.active { color: #fff; transform: scale(1.05); font-weight: 800; }
        .tab-item.active svg { filter: drop-shadow(0 2px 10px rgba(255,255,255,0.5)); }
        .tab-item svg { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); color: inherit; }

        /* Spatial UI 质感卡片核心 - 更深背景，更亮边缘，增强立体感 */
        .glass-card {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(25px) saturate(150%); -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.08);
            border-radius: 28px;
        }

        /* 智能深浅色切换类 */
        .card-bg-switch { background: var(--dark-bg) !important; }
        body.light .card-bg-switch { background: var(--light-bg) !important; border-color: rgba(0,0,0,0.12) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.08) !important; }
        
        .random-bg-switch { background: var(--dark-bg) !important; }
        body.light .random-bg-switch { background: var(--light-bg) !important; }

        .dynamic-text { --dynamic-color: var(--c-dark); color: var(--dynamic-color) !important; }
        body.light .dynamic-text { --dynamic-color: var(--c-light); }

        .large-title { font-size: 38px; font-weight: 900; padding: 60px 24px 10px 24px; letter-spacing: -1px; color: white; transition: all 0.3s ease; display: flex; flex-direction: column; }

        /* 优化详情页的性能：去除多余的 background-color 渲染，启用 translate3d 硬件加速 */
        #recipeDetail { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); background: #050505; will-change: transform; }
        .detail-show .detail-inner { opacity: 1; transform: translate3d(0, 0, 0); }
        .detail-inner { transition: all 0.3s ease 0.1s; opacity: 0; transform: translate3d(0, 30px, 0); }

        .ing-tag { border: 1px solid rgba(255,255,255,0.12); color: #AAA; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); background: rgba(255,255,255,0.06); white-space: nowrap; }
        .ing-tag:active { transform: scale(0.92); }
        .ing-tag.selected { background: #FA2D48; color: #fff; border-color: #FA2D48; transform: scale(1.05); box-shadow: 0 6px 16px rgba(250,45,72,0.4); font-weight: 800; }

        @keyframes stagger-fade-in { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .stagger-item { opacity: 0; animation: stagger-fade-in 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

        @keyframes pour-action { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
        @keyframes muddle-action { 0%, 100% { transform: translateY(0) translateZ(0); } 50% { transform: translateY(6px) translateZ(0); } }
        @keyframes shake-action { 0%, 100% { transform: translate(0,0) rotate(0deg) translateZ(0); } 25% { transform: translate(2px,-2px) rotate(5deg) translateZ(0); } 75% { transform: translate(-2px,2px) rotate(-5deg) translateZ(0); } }
        @keyframes item-fall { 0% { transform: translateY(-20px) translateZ(0); opacity: 0; } 100% { transform: translateY(0) translateZ(0); opacity: 1; } }
        @keyframes spin-stir { 0% { transform: scaleX(1); } 50% { transform: scaleX(-1); } 100% { transform: scaleX(1); } }
        @keyframes flame-flicker { 0%, 100% { transform: scale(1) skewX(0deg); opacity: 0.9; } 50% { transform: scale(1.1) skewX(-5deg); opacity: 1; } }
        @keyframes rim-glow { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 3px white); } }
        @keyframes wipe-wedge { 0% { transform: translate(var(--startX), var(--y)) rotate(-25deg); } 100% { transform: translate(var(--endX), var(--y)) rotate(25deg); } }
        @keyframes vigorous-shake { 0%, 100% { transform: translate(0, 0) rotate(0deg) translateZ(0); } 10% { transform: translate(-5px, -5px) rotate(-15deg) translateZ(0); } 20% { transform: translate(5px, 5px) rotate(15deg) translateZ(0); } 30% { transform: translate(-5px, 5px) rotate(-15deg) translateZ(0); } 40% { transform: translate(5px, -5px) rotate(15deg) translateZ(0); } 50% { transform: translate(-5px, -5px) rotate(-15deg) translateZ(0); } 60% { transform: translate(5px, 5px) rotate(15deg) translateZ(0); } 70% { transform: translate(-5px, 5px) rotate(-15deg) translateZ(0); } 80% { transform: translate(5px, -5px) rotate(15deg) translateZ(0); } 90% { transform: translate(-5px, -5px) rotate(-15deg) translateZ(0); } }
        @keyframes radar-expand { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 0.8; } }

        .anim-pour-line { stroke-dasharray: 4 4; animation: pour-action 0.3s infinite linear; }
        .anim-muddler { animation: muddle-action 0.4s infinite ease-in-out; }
        .anim-shaker { transform-origin: 32px 32px; animation: shake-action 0.2s infinite; }
        .anim-vigorous-shake { animation: vigorous-shake 0.4s infinite ease-in-out; transform-origin: center; }
        .anim-item-fall { animation: item-fall 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .anim-stir { animation: spin-stir 1s infinite ease-in-out; transform-origin: 32px center; }
        .anim-flame { animation: flame-flicker 0.15s infinite alternate; transform-origin: 32px 20px; }
        .anim-pour-bounce { animation: muddle-action 0.8s infinite ease-in-out; }
        .anim-rim-glow { animation: rim-glow 0.8s infinite alternate ease-in-out; }
        .anim-wipe-wedge { animation: wipe-wedge 1.2s infinite alternate ease-in-out; }
        
        .anim-radar-expand { 
            transform-origin: 50px 50px; 
            transform-box: view-box; 
            transform: scale(0); 
            opacity: 0; 
            animation: radar-expand 4s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards; 
        }
        
        .font-art { font-family: "Songti SC", "Noto Serif CJK SC", "STSong", "PT Serif", serif; }

        /* --- 白天模式极致适配 --- */
        body.light .ambient-bg { background: #F2F2F7; }
        body.light .ambient-orb-1 { background: rgba(94, 92, 230, 0.12); }
        body.light .ambient-orb-2 { background: rgba(10, 132, 255, 0.12); }
        
        body.light .text-white, body.light .large-title { color: #000; }
        body.light .text-white\/40 { color: rgba(0,0,0,0.5); }
        body.light .text-white\/50 { color: rgba(0,0,0,0.6); }
        body.light .text-white\/70 { color: rgba(0,0,0,0.8); }
        body.light .text-white\/80 { color: rgba(0,0,0,0.85); }
        body.light .text-white\/90 { color: rgba(0,0,0,0.95); }
        
        body.light .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 12px 35px rgba(0, 0, 0, 0.06); }
        body.light .glass-card .text-white, body.light #randomCardWrap .text-white { color: #000; }
        
        body.light .tab-bar-container { background: rgba(255, 255, 255, 0.85); border-color: rgba(0,0,0,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        body.light .tab-item { color: #666; }
        body.light .tab-item.active { color: #000; }
        
        body.light .bg-black\/30 { background-color: rgba(0,0,0,0.06); }
        body.light .bg-black\/40 { background-color: rgba(0,0,0,0.08); }
        body.light .bg-white\/5 { background-color: rgba(0,0,0,0.04); }
        body.light .bg-white\/10 { background-color: rgba(0,0,0,0.08); }
        body.light .border-white\/5 { border-color: rgba(0,0,0,0.06); }
        body.light .border-white\/10 { border-color: rgba(0,0,0,0.12); }
        
        body.light svg text { fill: #000 !important; }
        body.light svg line[stroke="rgba(255,255,255,0.2)"] { stroke: rgba(0,0,0,0.15) !important; }
        body.light svg polygon[stroke="rgba(255,255,255,0.15)"] { stroke: rgba(0,0,0,0.15) !important; }
        body.light svg path[stroke="rgba(255,255,255,0.7)"] { stroke: rgba(0,0,0,0.85) !important; }
        body.light #animationStage svg path[stroke="white"], body.light #animationStage svg line[stroke="white"] { stroke: rgba(0,0,0,0.85) !important; }
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.8)"] { fill: rgba(0,0,0,0.3) !important; }
        body.light #animationStage svg rect[fill="rgba(255,255,255,0.7)"] { fill: rgba(0,0,0,0.4) !important; }
        body.light #animationStage svg path[fill="rgba(255,255,255,0.2)"] { fill: rgba(0,0,0,0.15) !important; }
        
        body.light #diyModal input, body.light #diyModal textarea, body.light #diyModal select { color: #000; }
        body.light #diyModal select option { background: #fff; color: #000; }
        body.light #toast { background: rgba(255,255,255,0.95); color: #000; border-color: rgba(0,0,0,0.15); }
        body.light #recipeDetail { background: #F2F2F7; }

        /* 统一卡片居中排版类 */
        .cover-card-centered {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(25px) saturate(150%); -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.08);
            border-radius: 28px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 16px;
            content-visibility: auto; contain-intrinsic-size: 210px; 
        }
        .cover-card-centered:active { transform: scale(0.96); filter: brightness(0.9); }
    </style>
</head>

</div>

<div class="iphone bg-transparent" id="appRoot">

<script>
    const DEEPSEEK_API_KEY = "sk-7cdc2f2e2d8e433c8bf035a757546a31"; 
    let favoritedIds = [];
    let currentDetailId = null;
    let animTimer = null;
    let isOz = false; 
    let isLightMode = false; 
    let myCabinet = [];
    let shoppingList = [];
    let shoppingCheckedList = [];
    let tastingNotes = {};
    let currentListBase = '全部';
    let currentListFlavor = '全部风味';
    let currentLuckyFlavor = '全部';
    let currentSort = 'default';
    let tempRating = 0;
    let currentPage = null; 

    const escapeHTML = str => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');

    // 智能推断真实酒色引擎
    function getDrinkColor(name, ingStr, base) {
        let n = name.toLowerCase();
        let i = ingStr.toLowerCase();
        if (/莫吉托|南区|薄荷茱莉普/.test(n)) return "#76B041"; 
        if (/尼格罗尼|花花公子|美洲佬/.test(n)) return "#D90429"; 
        if (/古典|曼哈顿|教父|锈钉|罗伯罗伊|老广场/.test(n)) return "#D08C60"; 
        if (/马天尼|吉布森|薇丝帕/.test(n) && !/浓缩|肮脏|大都会|苹果|法国/.test(n)) return "#E9ECEF"; 
        if (/大都会|粉红佳人|海风|性感海滩|新加坡司令|僵尸/.test(n) || (/蔓越莓|红石榴/.test(i) && !/可乐|咖啡/.test(i))) return "#EF476F"; 
        if (/玛格丽特|得其利|吉姆雷特|金菲士|白佳人/.test(n)) return "#E9D8A6"; 
        if (/血腥玛丽|维珍玛丽/.test(n)) return "#9A031E"; 
        if (/浓缩马天尼|黑俄罗斯|咖啡/.test(n)) return "#3C2A21";

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        return `${r},${g},${b}`;
    }

    function getDarkerColor(hex) {
        let r = parseInt(hex.slice(1,3), 16) * 0.6;
        let g = parseInt(hex.slice(3,5), 16) * 0.6;
        let b = parseInt(hex.slice(5,7), 16) * 0.6;
        return `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
    }

    function hapticTabBarBump() {
        const bar = document.getElementById('bottomTab');
        if (!bar) return;
        bar.classList.remove('haptic-tab-bump');
        void bar.offsetWidth;
        bar.classList.add('haptic-tab-bump');

    const haptic = (type = 'light', opts = {}) => {
        const { force = false, tabBarVisual = false } = opts;
        try { if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; } catch (e) {}
        const pattern = HAPTIC_PATTERNS[type] || HAPTIC_PATTERNS.light;
        const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
        if (!force && (type === 'light' || type === 'selection' || type === 'rigid')) {
            if (now < _hapticLightUntil) return;
            _hapticLightUntil = now + 48;
        }
        let pulseOk = false;
        if (hapticSupportsVibrate) {
            try { navigator.vibrate(0); const arr = Array.isArray(pattern) ? pattern : [pattern]; pulseOk = navigator.vibrate(arr) !== false; } catch (e) {}
        }
        if (opts.tabBarVisual === true && !pulseOk) hapticTabBarBump();
    };

    function getRadarSvg(flavors, color) {
        const rMax = 35;
        const pts = flavors.map((f, i) => { const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (f/100)*rMax*Math.cos(angle)},${50 - (f/100)*rMax*Math.sin(angle)}`; }).join(' ');
        let bgWeb = [100, 75, 50, 25].map(p => {
            let str = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `${50 + (p/100)*rMax*Math.cos(angle)},${50 - (p/100)*rMax*Math.sin(angle)}`; }).join(' ');
            return `<polygon points="${str}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
        }).join('');
        let axes = Array.from({length:5}).map((_,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<line x1="50" y1="50" x2="${50+rMax*Math.cos(angle)}" y2="${50-rMax*Math.sin(angle)}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`; }).join('');
        let texts = ['酸', '甜', '苦', '烈', '果香'].map((l,i)=>{ const angle = (Math.PI / 2) - (2 * Math.PI * i / 5); return `<text x="${50+42*Math.cos(angle)}" y="${50-42*Math.sin(angle)+2}" fill="white" font-size="11" font-weight="900" text-anchor="middle" dominant-baseline="middle" opacity="0.9">${l}</text>`; }).join('');
        return `<svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">${bgWeb}${axes}<polygon points="${pts}" fill="${color}" stroke="${color}" stroke-width="2" stroke-linejoin="round" class="anim-radar-expand"/>${texts}</svg>`;

        if(/方糖|糖块|冰块|加冰|老冰/.test(text)) {
            conf.ice.forEach((ice, i) => { clippedItems += `<rect x="${ice.x}" y="${ice.y}" width="${ice.size}" height="${ice.size}" rx="2" fill="rgba(255,255,255,0.8)" class="anim-item-fall" style="animation-delay: ${i*0.1}s"/>`; });
        }
        if(/捣碎|压碎|打发|榨出/.test(text)) {
            if (conf.muddle) clippedItems += `<rect x="${conf.muddle.x - conf.muddle.w/2}" y="${conf.muddle.y}" width="${conf.muddle.w}" height="${conf.muddle.h}" rx="3" fill="rgba(255,255,255,0.7)" class="anim-muddler"/>`;
            else clippedItems += `<rect x="30" y="${conf.topY}" width="4" height="40" rx="2" fill="rgba(255,255,255,0.7)" class="anim-muddler"/>`;
        }
        let stirrerHtml = '';
        if(/搅拌|Rolling|混合/.test(text)) { stirrerHtml = `<line x1="${conf.stir.x1}" y1="${conf.stir.y1}" x2="${conf.stir.x2}" y2="${conf.stir.y2}" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" class="anim-stir"/>`; }
        if(/倒|注|补满|浮/.test(text)) {
            frontElements += `<g transform="translate(32, -5)"><path d="M -4 5 L -8 15 L 8 15 L 4 5 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" stroke-linejoin="round" class="anim-pour-bounce"/><line x1="0" y1="15" x2="0" y2="${currentY + 5}" stroke="${themeC}" stroke-width="2.5" stroke-linecap="round" class="anim-pour-line" stroke-dasharray="6 4"/></g>`;
        }
        if(/擦拭|沾上|盐圈|糖边/.test(text)) {
            frontElements += `<line x1="${conf.rim.x1}" y1="${conf.topY}" x2="${conf.rim.x2}" y2="${conf.topY}" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 4" class="anim-rim-glow"/><path d="M -6 -8 Q 0 0 6 -8 Z" fill="${themeC}" class="anim-wipe-wedge" style="--startX: ${conf.rim.x1}px; --endX: ${conf.rim.x2}px; --y: ${conf.topY}px;"/>`;
        }
        if(/点燃|火焰/.test(text)) { frontElements += `<path d="M 32 ${conf.topY-2} C 35 ${conf.topY-10}, 32 ${conf.topY-20}, 32 ${conf.topY-20} C 32 ${conf.topY-20}, 29 ${conf.topY-10}, 32 ${conf.topY-2}" fill="#FF5722" class="anim-flame"/>`; }
        if(/装饰|精油|樱桃|薄荷|柠檬皮|橙皮|橄榄|青柠角|咖啡豆/.test(text)) {
            frontElements += `<g class="anim-item-fall"><circle cx="${conf.garnish.x}" cy="${conf.garnish.y}" r="3.5" fill="${themeC}"/><path d="M ${conf.garnish.x} ${conf.garnish.y} Q ${conf.garnish.x+6} ${conf.garnish.y-6} ${conf.garnish.x+10} ${conf.garnish.y-2}" fill="none" stroke="${themeC}" stroke-width="2" stroke-linecap="round"/></g>`;
        }

        return `<svg viewBox="0 0 64 64" class="w-full h-full overflow-visible">
            <defs><clipPath id="c_${drink.id}"><path d="${conf.clip}"/></clipPath></defs>
            ${stirrerHtml}
            <g clip-path="url(#c_${drink.id})">
                <rect x="0" y="${currentY}" width="64" height="64" fill="${themeC}" opacity="0.5" class="transition-all duration-700 ease-in-out"/>
                <line x1="0" y1="${currentY}" x2="64" y2="${currentY}" stroke="${themeC}" stroke-width="1.5" opacity="0.8" class="transition-all duration-700 ease-in-out"/>
                ${clippedItems}
            </g>
            <path d="${conf.path}" fill="none" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
            ${frontElements}
        </svg>`;
    }

    function showMsg(m, success=false) { 
        const t=document.getElementById('toast'); 
        document.getElementById('toastText').innerText=m; 
        const icon = document.getElementById('toastIcon');
        if(success) { icon.classList.remove('hidden'); } else { icon.classList.add('hidden'); }
        t.classList.remove('hidden'); setTimeout(()=>t.classList.remove('opacity-0'),10); 
        setTimeout(()=>{ t.classList.add('opacity-0'); setTimeout(()=>t.classList.add('hidden'),300); },2000); 
    }

    function switchPage(pageId, el, filter=null, direction='fade') {
        if (currentPage === pageId) {
            haptic('light', { tabBarVisual: true });
            return;
        }
        currentPage = pageId;

        haptic('selection', { tabBarVisual: true }); 
        if(animTimer) clearInterval(animTimer);
        const content = document.getElementById('appContent');
        content.style.transition = 'all 0.25s cubic-bezier(0.32, 0.72, 0, 1)';
        content.style.opacity = '0';
        
        // 启用 3D 硬件加速
        if(direction === 'forward') content.style.transform = 'translate3d(-30px, 0, 0)';
        else if(direction === 'backward') content.style.transform = 'translate3d(30px, 0, 0)';
        else content.style.transform = 'scale(0.97) translate3d(0, 0, 0)';
        
        setTimeout(() => {
            // 这里替换大规模的 DOM
            if(pageId==='recipes') renderList(filter);
            else if(pageId==='cabinet') renderCabinet();
            else if(pageId==='randomizer') renderShuffle();
            else if(pageId==='profile') renderProfile();
            
            content.style.transition = 'none';
            if(direction === 'forward') content.style.transform = 'translate3d(40px, 0, 0)';
            else if(direction === 'backward') content.style.transform = 'translate3d(-40px, 0, 0)';
            else content.style.transform = 'scale(1.02) translate3d(0, 0, 0)';
            
            // 使用双重 requestAnimationFrame 将“DOM渲染”与“动画开始”解耦，彻底解决切换卡顿掉帧
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    content.style.transition = 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
                    content.style.opacity = '1';
                    content.style.transform = 'translate3d(0, 0, 0) scale(1)';
                    content.scrollTop = 0;
                });
            });
        }, 250);

        if(el) { document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
    }

    window.renderListHTMLOnly = function() {
        const bases = ['全部', '琴酒', '威士忌', '朗姆酒', '伏特加', '龙舌兰', '白兰地'];
        const flavors = ['全部风味', '偏酸', '偏甜', '微苦', '浓烈', '果香'];
        const kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim().toLowerCase() : '';
        
        const activeClass = isLightMode ? 'bg-black text-[#fff] border-black shadow-md' : 'bg-white text-black border-white shadow-[0_2px_10px_rgba(255,255,255,0.2)]';
        const inactiveClass = isLightMode ? 'bg-black/5 border-transparent text-black/60 hover:bg-black/10' : 'bg-white/5 border-transparent text-white/60 hover:bg-white/10';

        let tagsHtml = `<div class="px-6 flex space-x-2.5 overflow-x-auto no-scrollbar mb-3 pb-1">`;
        bases.forEach(f => {
            const isSel = currentListBase === f;
            tagsHtml += `<div class="px-4 py-1.5 rounded-full border text-[12px] font-bold whitespace-nowrap cursor-pointer transition-all flex-shrink-0 ${isSel ? activeClass : inactiveClass}" onclick="filterListByBase('${f}')">${f}</div>`;
        });
        tagsHtml += `</div>`;

        tagsHtml += `<div class="px-6 flex space-x-2.5 overflow-x-auto no-scrollbar mb-4 pb-2">`;
        flavors.forEach(f => {
            const isSel = currentListFlavor === f;
            tagsHtml += `<div class="px-4 py-1.5 rounded-full border text-[12px] font-bold whitespace-nowrap cursor-pointer transition-all flex-shrink-0 ${isSel ? activeClass : inactiveClass}" onclick="filterListByFlavor('${f}')">${f}</div>`;
        });
        tagsHtml += `</div>`;

        if(document.getElementById('filterTags')) document.getElementById('filterTags').innerHTML = tagsHtml;

        let list = cocktailDB.filter(d => !(d.isAI && !d.saved));
        
        // 1. 基酒筛选
        if(currentListBase && currentListBase !== '全部') list = list.filter(d => d.base.includes(currentListBase));
        
        // 2. 风味筛选
        if(currentListFlavor && currentListFlavor !== '全部风味') {
            if (currentListFlavor === '偏酸') list = list.filter(d => d.flavors[0] >= 55);
            else if (currentListFlavor === '偏甜') list = list.filter(d => d.flavors[1] >= 55);
            else if (currentListFlavor === '微苦') list = list.filter(d => d.flavors[2] >= 55);
            else if (currentListFlavor === '浓烈') list = list.filter(d => d.abv >= 20);
            else if (currentListFlavor === '果香') list = list.filter(d => d.flavors[4] >= 55);
        }

        // 3. 关键字搜索
        if(kw) { list = list.filter(d => d.zh.toLowerCase().includes(kw) || d.en.toLowerCase().includes(kw) || d.base.toLowerCase().includes(kw) || d.ingredients.some(ing => ing.toLowerCase().includes(kw))); }

        if (currentSort === 'ratingDesc') {
            list.sort((a, b) => {
                let ratingA = tastingNotes[a.id]?.rating || 0;
                let ratingB = tastingNotes[b.id]?.rating || 0;
                if (ratingB !== ratingA) return ratingB - ratingA;
                return parseInt(a.id.replace(/\D/g, '') || 0) - parseInt(b.id.replace(/\D/g, '') || 0);
            });
        }

        let cardsHtml = list.map((d, i) => {
            const noteInfo = tastingNotes[d.id];
            const hasRating = noteInfo && noteInfo.rating > 0;
            const subtitleHtml = hasRating 
                ? `<div class="text-[11px] text-[#D4AF37] font-medium mt-1 tracking-widest drop-shadow-md">${'★'.repeat(noteInfo.rating)}</div>` 
                : `<div class="text-[10px] font-medium text-white/70 truncate tracking-wide uppercase mt-1 w-full px-2">${d.en}</div>`;

            return `
            <div class="cover-card-centered stagger-item group h-[210px] cursor-pointer card-bg-switch" style="--dark-bg: ${d.darkGrad}; --light-bg: ${d.lightGrad}; animation-delay: ${Math.min(i*0.03, 0.4)}s" onclick="openDetail('${d.id}')">
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-32 h-32 blur-[40px] opacity-30 rounded-full transition-opacity duration-500 group-hover:opacity-60" style="background: ${d.themeColor}"></div>
                </div>
                
                <div class="w-[72px] h-[72px] mb-3 opacity-90 drop-shadow-[0_8px_16px_rgba(0,0,0,0.4)] z-10 transform transition-transform duration-500 group-hover:scale-110">
                    ${window.getGlassSvgCover(d.glass, d.themeColor)}
                </div>
                
                <div class="z-10 w-full flex flex-col items-center text-center">
                    <div class="text-[16px] font-bold text-white drop-shadow-md truncate w-full px-1 dynamic-text" style="--c-dark: #FFFFFF; --c-light: #000000;">${d.zh}</div>
                    ${subtitleHtml}
                </div>
            </div>
            `;
        }).join('');
        if(list.length === 0) cardsHtml = `<div class="col-span-2 text-center text-white/30 text-sm mt-10">未找到相关酒款或配方材料</div>`;
        if(document.getElementById('recipeGrid')) document.getElementById('recipeGrid').innerHTML = cardsHtml;
    }

    window.addMissingToCart = function(namesStr, e) {
        e.stopPropagation(); haptic('success');

        names.forEach(n => { 
            if(!shoppingList.includes(n)) { 
                shoppingList.push(n); 
                addedCount++; 
            } else if (shoppingCheckedList.includes(n)) {
                shoppingCheckedList = shoppingCheckedList.filter(x => x !== n);
                addedCount++; 
            }
        });
        saveLocalData();
        showMsg(addedCount > 0 ? '材料已加入采购单 🛒' : '材料已在采购单中', addedCount > 0);
        
        const html = document.getElementById('appContent').innerHTML;
        if(addedCount > 0 && !html.includes('w-4 h-4 bg-ios-red')) renderCabinet(); 
    }

    window.updateCabinetResults = function() {
        let perfect = [], missing1 = [], missing2 = [], missing3 = [];
        cocktailDB.forEach(d => {
            if (d.isAI && !d.saved) return; 
            let reqArr = Array.from(d.reqCats); if(reqArr.length === 0) return;
            let matchedCount = reqArr.filter(c => myCabinet.includes(c)).length;
            let missingCount = reqArr.length - matchedCount;
            if (matchedCount > 0) {
                if (missingCount === 0) perfect.push(d);
                else if (missingCount === 1) missing1.push(d);
                else if (missingCount === 2) missing2.push(d);
                else if (missingCount === 3) missing3.push(d);
            }
        });

        const subMap = [
            { k: '君度', v: '三罗或普通橙皮酒' }, { k: '三罗', v: '君度或普通橙皮酒' }, { k: '橙酒', v: '君度或三罗' }, { k: '青柠', v: '柠檬或白醋' },
            { k: '柠檬', v: '青柠或酸果汁' }, { k: '苏打', v: '减糖雪碧或气泡水' }, { k: '糖浆', v: '白糖+水或蜂蜜' }, { k: '红石榴', v: '蔓越莓或糖浆' },
            { k: '干味美思', v: '干白葡萄酒' }, { k: '味美思', v: '干白或红葡萄酒' }, { k: '咖啡利口酒', v: '浓缩咖啡+伏特加' }, { k: '黑樱桃', v: '樱桃果酱+烈酒' },
            { k: '苦艾酒', v: '茴香酒(Pastis)' }, { k: '苦精', v: '陈皮浸泡烈酒' }, { k: '姜汁', v: '雪碧+鲜姜泥' }, { k: '可乐', v: '其他气泡饮料' },
            { k: '起泡酒', v: '苏打水+白葡萄酒' }, { k: '香槟', v: '干型起泡酒' }, { k: '干邑', v: '普通白兰地' }, { k: '百香果', v: '芒果汁+少许柠檬' }
        ];

        let contentHtml = `<div class="px-6 pb-20">`;
        if(perfect.length > 0) {
            contentHtml += `<div class="text-[#FA2D48] font-bold text-[16px] mb-4 tracking-wider uppercase">✨ 完美匹配 (${perfect.length})</div><div class="grid grid-cols-2 gap-4 mb-10">`;
            perfect.forEach((d,i) => { 
                contentHtml += `<div class="cover-card-centered stagger-item group h-[210px] cursor-pointer card-bg-switch" style="--dark-bg: ${d.darkGrad}; --light-bg: ${d.lightGrad}; animation-delay: ${Math.min(i*0.04, 0.6)}s" onclick="openDetail('${d.id}')">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="w-32 h-32 blur-[40px] opacity-40 rounded-full transition-opacity duration-500 group-hover:opacity-70" style="background: ${d.themeColor}"></div>
                    </div>
                    <div class="w-[72px] h-[72px] mb-3 opacity-90 drop-shadow-[0_8px_16px_rgba(0,0,0,0.4)] z-10 transform transition-transform duration-500 group-hover:scale-110">
                        ${window.getGlassSvgCover(d.glass, d.themeColor)}
                    </div>
                    <div class="z-10 w-full flex flex-col items-center text-center">
                        <div class="text-[16px] font-bold drop-shadow-md truncate w-full px-1 dynamic-text" style="--c-dark: #FFFFFF; --c-light: #000000;">${d.zh}</div>
                        <div class="text-[10px] font-medium text-white/70 truncate tracking-wide uppercase mt-1 w-full px-2">${d.en}</div>
                    </div>
                </div>`; 
            });
            contentHtml += `</div>`;
        }
        if(missing1.length > 0) {
            contentHtml += `<div class="text-white/70 font-bold text-[16px] mb-4 tracking-wider">🛒 缺少 1 种材料 (${missing1.length})</div><div class="grid grid-cols-2 gap-4 mb-10">`;
            missing1.slice(0,10).forEach((d,i) => { 
                let missingNames = Array.from(d.reqCats).filter(c => !myCabinet.includes(c));
                let missingCat = missingNames[0];
                let actualMissingIng = d.ingredients.find(ing => cabinetItems.find(c => c.name === missingCat)?.kw.some(k => ing.includes(k))) || missingCat;
                let foundSub = subMap.find(s => actualMissingIng.includes(s.k));

    window.toggleShoppingItem = function(el, item) {
        haptic('light');
        const c = el.querySelector('.chk');
        const svg = el.querySelector('svg');
        const textWrap = el.querySelector('.shop-text-wrap');
        const themeColor = '#0A84FF'; 
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';

        if(c.dataset.checked === '1') {
            c.dataset.checked = '0';
            c.style.backgroundColor = '';
            c.style.borderColor = inactiveBorder;
            svg.style.opacity = '0';
            textWrap.classList.remove('opacity-30', 'line-through');
            shoppingCheckedList = shoppingCheckedList.filter(n => n !== item);
        } else {
            c.dataset.checked = '1';
            c.style.backgroundColor = themeColor;
            c.style.borderColor = themeColor;
            svg.style.opacity = '1';
            textWrap.classList.add('opacity-30', 'line-through');
            if(!shoppingCheckedList.includes(item)) shoppingCheckedList.push(item);
        }
        saveLocalData();
        
        const hasChecked = shoppingCheckedList.length > 0;
        const clearBtn = document.getElementById('clearCheckedBtn');
        if(clearBtn) {
            clearBtn.style.display = hasChecked ? 'block' : 'none';
        }

        setTimeout(() => {
            renderShoppingContent();
        }, 350);
    }

    window.toggleIngredient = function(el, themeColor, total) {
        haptic('light');
        const c = el.querySelector('.chk');
        const svg = c && c.querySelector('svg');
        const textWrap = el.querySelector('.ing-text-wrap');
        if (!c) return;
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.22)' : 'rgba(255,255,255,0.3)';

        if (c.dataset.checked === '1') {
            c.dataset.checked = '0';
            c.style.backgroundColor = '';
            c.style.borderColor = inactiveBorder;
            c.style.boxShadow = 'none';
            if (svg) svg.style.opacity = '0';
            if (textWrap) {
                textWrap.classList.remove('opacity-30', 'line-through');
            }
        } else {
            c.dataset.checked = '1';
            c.style.backgroundColor = themeColor;
            c.style.borderColor = themeColor;
            c.style.boxShadow = `0 0 12px ${themeColor}66`;
            if (svg) svg.style.opacity = '1';
            if (textWrap) textWrap.classList.add('opacity-30', 'line-through');
        }

        const detail = document.getElementById('detailContent');
        if (!detail) return;
        const n = detail.querySelectorAll('.ing-check-row .chk[data-checked="1"]').length;
        const counter = document.getElementById('ingCounter');
        const bar = document.getElementById('ingProgressBar');
        if (counter) counter.textContent = String(n);
        if (bar && total > 0) bar.style.width = `${(n / total) * 100}%`;
    };

    window.toggleFavorite = function() {
        const id = currentDetailId;
        if (!id) return;
        haptic('medium');
        const d = cocktailDB.find(x => String(x.id) === String(id));
        if (!d) return;

        const idx = favoritedIds.findIndex(x => String(x) === String(id));
        if (idx > -1) favoritedIds.splice(idx, 1);
        else favoritedIds.push(d.id);

        saveLocalData();

        const isFav = favoritedIds.some(x => String(x) === String(id));
        const btn = document.getElementById('detailFavBtn');
        if (btn) {
            btn.innerText = isFav ? '★' : '☆';
            btn.style.color = isFav ? (isLightMode ? d.darkerColor : d.themeColor) : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.4)');
        }

        if (document.getElementById('recipeGrid')) renderListHTMLOnly();
        const profileTab = document.getElementById('tab-profile');
        if (profileTab && profileTab.classList.contains('active')) renderProfile();
    };

    window.shareRecipe = function() {
        const id = currentDetailId;
        if (!id) return;
        const d = cocktailDB.find(x => String(x.id) === String(id));
        if (!d) return;
        haptic('light');
        const lines = [`${d.zh} (${d.en})`, '', '材料：', ...d.ingredients, '', '步骤：', ...d.steps.map((s, i) => `${i + 1}. ${s}`)];
        const text = lines.join('\n');
        if (navigator.share) {
            navigator.share({ title: d.zh, text }).catch(() => {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => showMsg('配方已复制到剪贴板', true)).catch(() => showMsg('无法分享或复制'));
                }
            });
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => showMsg('配方已复制到剪贴板', true)).catch(() => showMsg('复制失败'));
        } else {
            showMsg('当前环境不支持分享');
        }
    };

    function renderShoppingContent() {
        const modal = document.getElementById('shoppingModal');
        modal.style.backgroundColor = isLightMode ? '#F2F2F7' : '#050505';
        
        let headerBg = isLightMode ? 'rgba(242, 242, 247, 0.9)' : 'rgba(0, 0, 0, 0.9)';
        let headerBorder = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        let textPrimary = isLightMode ? '#000000' : '#FFFFFF';
        let textSecondary = isLightMode ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';
        let textEmpty = isLightMode ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';
        let dividerLine = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)';
        let dividerTextBg = isLightMode ? '#E5E5EA' : '#121214';

        let html = `
            <div class="flex items-center justify-between px-6 pb-3 relative z-20 border-b backdrop-blur-md" style="padding-top: calc(16px + env(safe-area-inset-top, 24px)); background-color: ${headerBg}; border-color: ${headerBorder}; color: ${textPrimary};">
                <button onclick="closeShoppingModal()" class="text-ios-blue text-[16px] p-2 -ml-2 font-medium active:opacity-50 transition-opacity">完成</button>
                <div class="font-bold text-[16px] tracking-wide dynamic-text" style="--c-dark: #FFFFFF; --c-light: #000000;">我的采购清单</div>
                <button onclick="clearShoppingList()" class="text-ios-red text-[14px] p-2 -mr-2 font-medium active:opacity-50 transition-opacity">清空全部</button>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-6 pb-32" style="background-color: ${isLightMode ? '#F2F2F7' : '#050505'}; color: ${textPrimary};">`;

        if (shoppingList.length === 0) {
            html += `<div class="text-center text-sm mt-20" style="color: ${textEmpty}">清单空空如也<br><br>去酒柜看看有什么缺少的材料吧！</div>`;
        } else {
            html += `
            <div class="flex justify-between items-center mb-4 ml-1 min-h-[28px]">
                <div class="text-[12px]" style="color: ${textSecondary}">点击可将其标记为已采购：</div>
                <div id="clearCheckedBtn" onclick="clearCheckedShoppingItems()" class="text-[12px] text-ios-blue cursor-pointer active:opacity-50 font-bold bg-ios-blue/10 px-3 py-1 rounded-full border border-ios-blue/20" style="display: ${shoppingCheckedList.length > 0 ? 'block' : 'none'};">清理已购</div>
            </div>`;
            
            const uncheckedItems = shoppingList.filter(item => !shoppingCheckedList.includes(item));
            const checkedItems = shoppingList.filter(item => shoppingCheckedList.includes(item));

            const renderItem = (item, isChecked) => {
                const inlineStyle = isChecked ? `background-color: #0A84FF; border-color: #0A84FF;` : `border-color: ${isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)'};`;
                const svgOp = isChecked ? '1' : '0';
                const textClass = isChecked ? 'opacity-30 line-through' : '';
                return `
                <div onclick="toggleShoppingItem(this, '${item}')" class="glass-card rounded-[20px] p-4 flex items-center justify-between active:scale-95 transition-all cursor-pointer mb-3 card-bg-switch" style="--dark-bg: rgba(18, 18, 20, 0.7); --light-bg: rgba(255,255,255,0.8);">
                    <div class="shop-text-wrap transition-all duration-300 ${textClass}">
                        <span class="font-bold text-[16px] dynamic-text" style="--c-dark: #FFFFFF; --c-light: #000000;">${item}</span>
                    </div>
                    <div class="chk w-[24px] h-[24px] rounded-full border flex items-center justify-center transition-all duration-300 flex-shrink-0" data-checked="${isChecked ? '1' : '0'}" style="${inlineStyle}">
                        <svg viewBox="0 0 24 24" class="w-4 h-4 text-white transition-opacity duration-300 fill-current" style="opacity: ${svgOp}"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                    </div>
                </div>`;
            };

            uncheckedItems.forEach(item => html += renderItem(item, false));
            
            if(checkedItems.length > 0 && uncheckedItems.length > 0) {
                html += `<div class="w-full h-px my-6 border-t border-dashed relative flex justify-center" style="border-color: ${dividerLine};"><span class="absolute -top-2.5 px-3 text-[10px] tracking-widest font-bold z-10 rounded-full" style="background-color: ${dividerTextBg}; color: ${textSecondary};">已采购项目</span></div>`;
            }

            checkedItems.forEach(item => html += renderItem(item, true));
        }
        html += `</div>`;
        modal.innerHTML = html;
    }

        try {
            const data = JSON.parse(decodeURIComponent(atob(input)));
            if(data.favs) localStorage.setItem('cm_favs', JSON.stringify(data.favs));
            if(data.cabinet) localStorage.setItem('cm_cabinet', JSON.stringify(data.cabinet));
            if(data.shopping) localStorage.setItem('cm_shopping', JSON.stringify(data.shopping));
            if(data.notes) localStorage.setItem('cm_notes', JSON.stringify(data.notes));

    async function fetchWithRetry(url, options, retries = 3) {
        const delays = [1000, 2000, 4000]; 
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if(response.status === 401 || response.status === 402 || response.status === 403) { throw new Error('API_AUTH_ERROR'); }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                if (error.message === 'API_AUTH_ERROR') throw error;
                if (i === retries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }
    }

    window.callAIBartender = async function() {
        const input = document.getElementById('aiMoodInput').value.trim();
        if(!input) { showMsg("请先描述一下你的心情或场景哦！"); return; }
        
        if(!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY.length < 10) {
            showMsg("请先在代码配置中填入 API Key", false);
            return;
        }

        haptic('medium');
        const loadingModal = document.getElementById('aiLoadingModal');
        loadingModal.classList.remove('hidden');
        setTimeout(() => loadingModal.classList.remove('opacity-0'), 10);

        const systemPrompt = `You are a world-class mixologist with a poetic soul. 
        Create a totally unique, professional, and creative cocktail recipe tailored to the user's mood, story, or scene.
        Return ONLY a valid JSON object matching this EXACT schema, no markdown code blocks, no extra text:
        { "zh": "Creative Name in Chinese", "en": "Creative Name in English", "glass": "martini or rocks or highball or shot or flute or coupe", "abv": 20, "base": "琴酒 or 伏特加 or 威士忌 or 白兰地 or 朗姆酒 or 龙舌兰", "ingredients": ["材料A 45ml", "材料B 20ml", "冰块 适量"], "steps": ["专业步骤 1", "专业步骤 2", "专业步骤 3", "专业步骤 4", "专业步骤 5"], "flavors": [50, 60, 20, 40, 80], "tagline": "A poetic, moody sentence about this drink in Chinese", "aiDesc": "A brief, empathetic explanation in Chinese of why this specific cocktail perfectly fits their mood." }`;

        try {
            const result = await fetchWithRetry('https://api.deepseek.com/chat/completions', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` }, 
                body: JSON.stringify({ 
                    model: 'deepseek-chat',
                    messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: input }],
                    response_format: { type: 'json_object' }
                }) 
            });
            
            let textResponse = result.choices[0].message.content.trim();
            if (textResponse.startsWith('```json')) textResponse = textResponse.replace(/^```json/, '').replace(/```$/, '');
            else if (textResponse.startsWith('```')) textResponse = textResponse.replace(/^```/, '').replace(/```$/, '');
            
            const aiRecipe = JSON.parse(textResponse);

            const hexColor = getDrinkColor(aiRecipe.zh, aiRecipe.ingredients.join(' '), aiRecipe.base || "伏特加");
            const rgb = hexToRgb(hexColor);
            const darkGrad = `radial-gradient(circle at 80% 0%, rgba(${rgb},0.3) 0%, transparent 65%), radial-gradient(circle at 20% 100%, rgba(${rgb},0.15) 0%, transparent 65%), #050505`;
            const lightGrad = `radial-gradient(circle at 80% 0%, rgba(${rgb},0.15) 0%, transparent 60%), radial-gradient(circle at 20% 100%, rgba(${rgb},0.05) 0%, transparent 60%), #FFFFFF`;
            const darkerColor = getDarkerColor(hexColor);

            const newCocktail = {
                id: 'diy_ai_' + Date.now(), zh: aiRecipe.zh + ' ✨', en: aiRecipe.en, glass: aiRecipe.glass || 'rocks', abv: aiRecipe.abv || 15, base: aiRecipe.base || "伏特加", ingredients: aiRecipe.ingredients, steps: aiRecipe.steps, flavors: aiRecipe.flavors || [40, 50, 40, 50, 50],
                themeColor: hexColor, darkerColor: darkerColor, darkGrad: darkGrad, lightGrad: lightGrad, tagline: aiRecipe.tagline || "来自赛博空间的专属微醺", isAI: true, aiDesc: aiRecipe.aiDesc,
                saved: false, 
                reqCats: (() => { let cats = new Set(); (aiRecipe.ingredients||[]).forEach(ing => { cabinetItems.forEach(cat => { if(cat.kw.some(k => String(ing).includes(k))) cats.add(cat.name); }); }); cabinetItems.forEach(cat => { if(cat.kw.some(k => (aiRecipe.base || "伏特加").includes(k))) cats.add(cat.name); }); return cats; })()
            };
            cocktailDB.unshift(newCocktail); 
            
            loadingModal.classList.add('opacity-0');
            setTimeout(() => { loadingModal.classList.add('hidden'); showRandomModal(newCocktail); }, 300);
        } catch (error) {
            console.error(error); 
            loadingModal.classList.add('opacity-0');
            setTimeout(() => { 
                loadingModal.classList.add('hidden'); 
                if (error.message === 'API_AUTH_ERROR') showMsg("API Key 错误或余额不足！");
                else showMsg("网络异常或 AI 酒保太忙啦，稍后再试！");
            }, 300);
        }
    };

    window.saveDIYRecipe = function() {
        const zh = document.getElementById('diyZh').value.trim();
        const en = document.getElementById('diyEn').value.trim() || 'Custom Recipe';
        const base = document.getElementById('diyBase').value;
        const glass = document.getElementById('diyGlass').value;
        const abv = parseInt(document.getElementById('diyAbv').value) || 0;
        const ingText = document.getElementById('diyIng').value.trim();
        const stepText = document.getElementById('diySteps').value.trim();

        if (!zh || !ingText || !stepText) { showMsg('请填写完整的名称、材料和步骤！'); return; }

        const ingredients = ingText.split('\n').map(s => s.trim()).filter(s => s);
        const steps = stepText.split('\n').map(s => s.trim()).filter(s => s);

        let reqCats = new Set();
        ingredients.forEach(ing => { cabinetItems.forEach(cat => { if(cat.kw.some(k => ing.includes(k))) reqCats.add(cat.name); }); });
        cabinetItems.forEach(cat => { if(cat.kw.some(k => base.includes(k))) reqCats.add(cat.name); });

        let calcFlavors = [20, 20, 20, 20, 20]; 
        let ingStr = ingredients.join(' ');
        
        if (ingStr.match(/柠檬|青柠|酸/)) calcFlavors[0] = 75; else if (ingStr.match(/西柚|番茄/)) calcFlavors[0] = 45;
        if (ingStr.match(/糖|蜜|利口酒|可乐|雪碧|甜|百利/)) calcFlavors[1] = 70; else if (ingStr.match(/味美思|果汁/)) calcFlavors[1] = 45;
        if (ingStr.match(/苦精|金巴利|阿玛罗|咖啡|茶/)) calcFlavors[2] = 85; else if (ingStr.match(/柚|皮/)) calcFlavors[2] = 40;
        if (abv >= 30) calcFlavors[3] = 90; else if (abv >= 20) calcFlavors[3] = 70; else if (abv >= 10) calcFlavors[3] = 45; else calcFlavors[3] = 10;
        if (ingStr.match(/汁|果|樱桃|橙|菠萝|莓|柚/)) calcFlavors[4] = 85; else if (ingStr.match(/薄荷|玫瑰|花/)) calcFlavors[4] = 50;

        calcFlavors = calcFlavors.map(v => Math.min(100, Math.max(0, v + Math.floor(Math.random()*16 - 8))));

        const hexColor = getDrinkColor(zh, ingredients.join(' '), base);
        const rgb = hexToRgb(hexColor);
        const darkGrad = `radial-gradient(circle at 80% 0%, rgba(${rgb},0.3) 0%, transparent 65%), radial-gradient(circle at 20% 100%, rgba(${rgb},0.15) 0%, transparent 65%), #050505`;
        const lightGrad = `radial-gradient(circle at 80% 0%, rgba(${rgb},0.15) 0%, transparent 60%), radial-gradient(circle at 20% 100%, rgba(${rgb},0.05) 0%, transparent 60%), #FFFFFF`;
        const darkerColor = getDarkerColor(hexColor);

        const newCocktail = {
            id: 'diy_' + Date.now(), zh: zh, en: en, glass: glass, abv: abv, base: base, ingredients: ingredients, steps: steps, flavors: calcFlavors,
            themeColor: hexColor, darkerColor: darkerColor, darkGrad: darkGrad, lightGrad: lightGrad, tagline: "我的专属定制微醺配方", reqCats: reqCats, saved: true
        };

        cocktailDB.unshift(newCocktail); 
        saveLocalData();
        
        haptic('success'); showMsg('配方创建成功！', true); closeDIYModal();
        switchPage('recipes', document.getElementById('tab-recipes')); 
    }

        haptic('light');
        
        if (tempRating === idx) {
            tempRating = 0;
        } else {
            tempRating = idx;
        }

        for(let i=1; i<=5; i++) {
            const el = document.getElementById('star-'+i);
            if(el) {
                el.innerText = i <= tempRating ? '★' : '☆';
                el.style.color = i <= tempRating ? '#D4AF37' : (isLightMode ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)');
                el.style.textShadow = i <= tempRating ? '0 0 10px rgba(212,175,55,0.5)' : 'none';
            }
        }
        
        const currentNoteInput = document.getElementById('noteInput');
        const currentNoteText = currentNoteInput ? currentNoteInput.value.trim() : '';
        
        if(!tastingNotes[id]) {
            tastingNotes[id] = { rating: 0, note: '' };
        }
        tastingNotes[id].rating = tempRating;
        if(currentNoteText) {
            tastingNotes[id].note = currentNoteText;
        }
        saveLocalData();
    }

                        <span id="ingCounter" style="color: ${isLightMode ? d.darkerColor : d.themeColor}; transition: color 0.3s;">0</span><span class="mx-1.5 opacity-50">/</span>${d.ingredients.length}
                    </div>
                </div>
                <div class="px-2 mb-6">
                    <div class="w-full h-[3px] rounded-full overflow-hidden" style="background-color: ${isLightMode ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.1)'}">
                        <div id="ingProgressBar" class="h-full w-0 transition-all duration-500 ease-out rounded-full" style="background-color: ${isLightMode ? d.darkerColor : d.themeColor}; box-shadow: 0 0 10px ${isLightMode ? d.darkerColor : d.themeColor};"></div>
                    </div>
                </div>
                
                <div class="glass-card rounded-[24px] overflow-hidden border-0 card-bg-switch" style="--dark-bg: rgba(18, 18, 20, 0.7); --light-bg: rgba(255,255,255,0.8);">
                    ${ingredientsHtml}
                </div>
            </div>

            <div class="mb-10">
                <div class="flex items-center px-2 mb-4">
                    <span class="text-[18px] font-black tracking-wide dynamic-text" style="--c-dark: rgba(255,255,255,0.9); --c-light: rgba(0,0,0,0.9);">制作方法</span>
                </div>
                <div class="glass-card rounded-[24px] overflow-hidden py-2 relative border-0 card-bg-switch" style="--dark-bg: rgba(18, 18, 20, 0.7); --light-bg: rgba(255,255,255,0.8);">
                    ${stepsHtml}
                </div>
            </div>
            
            <!-- 品鉴笔记 -->
            <div class="mb-20">
                <div class="flex items-center px-2 mb-4">
                    <span class="text-[18px] font-black tracking-wide dynamic-text" style="--c-dark: rgba(255,255,255,0.9); --c-light: rgba(0,0,0,0.9);">专属品鉴笔记</span>
                </div>
                <div class="glass-card rounded-[24px] p-5 relative overflow-hidden flex flex-col gap-4 border-0 card-bg-switch" style="--dark-bg: rgba(18, 18, 20, 0.7); --light-bg: rgba(255,255,255,0.8);">
                    <div class="flex justify-between items-center relative z-10">
                        <span class="text-[13px] font-bold tracking-wider uppercase dynamic-text" style="--c-dark: rgba(255,255,255,0.5); --c-light: rgba(0,0,0,0.5);">打个分数</span>
                        <div class="flex gap-1" id="starContainer">${starsHtml}</div>
                    </div>
                    <textarea id="noteInput" rows="3" class="w-full border rounded-[16px] p-4 text-[14px] leading-relaxed resize-none outline-none transition-all shadow-inner relative z-10 dynamic-text" style="background-color: ${isLightMode ? 'rgba(0,0,0,0.03)' : 'rgba(0,0,0,0.3)'}; border-color: ${isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)'}; --c-dark: rgba(255,255,255,0.9); --c-light: rgba(0,0,0,0.9);" placeholder="记录微调心得或品鉴感受，如：今天试了，下次糖可以少加 5ml...">${escapeHTML(savedNote.note || '')}</textarea>
                    <button onclick="saveNote('${d.id}')" class="w-full py-4 rounded-[16px] font-bold active:scale-95 transition-all shadow-md border relative z-10 dynamic-text" style="background-color: ${isLightMode ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.1)'}; border-color: ${isLightMode ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.1)'}; --c-dark: #FFFFFF; --c-light: #000000;">保存笔记</button>
                </div>
            </div>
            `;
        
        document.getElementById('detailContent').scrollTop = 0;
        document.getElementById('mainWrapper').classList.add('content-shrink');
        document.getElementById('bottomTab').style.transform = 'translateY(120px)';
        
        detail.style.transform = 'translate3d(0, 0, 0)';
        detail.classList.remove('translate-y-full');
        setTimeout(() => { detail.classList.add('detail-show'); startSim(d); }, 50);
    }

    window.closeRecipeDetail = function(slideRight = false) { 
        if(animTimer) { clearInterval(animTimer); clearTimeout(animTimer); }
        const detail = document.getElementById('recipeDetail'); 
        const mainWrap = document.getElementById('mainWrapper');
        
        // 强制使用硬件加速平滑过渡
        detail.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
        if (slideRight === true) {
            detail.style.transform = 'translate3d(100%, 0, 0)'; 
        } else {
            detail.style.transform = 'translate3d(0, 100%, 0)'; 
        }
        
        // 交由原生 CSS 接管复杂的背景恢复动画，彻底解放 JS 性能
        mainWrap.style.transition = 'all 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
        mainWrap.style.transform = '';
        mainWrap.style.opacity = '';
        mainWrap.classList.remove('content-shrink'); 
        
        detail.classList.remove('detail-show'); 
        detail.classList.add('translate-y-full'); 
        document.getElementById('bottomTab').style.transform = 'translateY(0)'; 
        
        const panel = document.getElementById('deleteMenuPanel');
        if(panel) {
            panel.classList.remove('opacity-100', 'scale-100');
            panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none', 'hidden');
        }
        
        setTimeout(() => {
            const profileTab = document.getElementById('tab-profile');
            if(profileTab && profileTab.classList.contains('active')) {
                renderProfile();
            }
            const stage = document.getElementById('animationStage');
            if (stage) stage.innerHTML = '';
            
            if (slideRight === true) {
                detail.style.transition = 'none';
                detail.style.transform = 'translate3d(0, 100%, 0)';
            }
        }, 400);
    }

    window.toggleDeleteMenu = function() {
        haptic('light');
        const panel = document.getElementById('deleteMenuPanel');
        if(panel.classList.contains('opacity-0')) {
            panel.classList.remove('hidden');
            setTimeout(() => { panel.classList.remove('opacity-0', 'scale-95', 'pointer-events-none'); panel.classList.add('opacity-100', 'scale-100'); }, 10);
        } else {
            panel.classList.remove('opacity-100', 'scale-100'); panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            setTimeout(() => panel.classList.add('hidden'), 300);
        }
    };

    window.confirmDeleteDIY = function(id) {
        haptic('heavy');
        const idx = cocktailDB.findIndex(x => x.id === id);
        if(idx > -1) cocktailDB.splice(idx, 1);
        
        const favIdx = favoritedIds.findIndex(fid => String(fid) === String(id));
        if(favIdx > -1) favoritedIds.splice(favIdx, 1);
        
        saveLocalData();
        showMsg('配方已彻底删除', true);
        closeRecipeDetail();
        
        setTimeout(() => {
            if(document.getElementById('recipeGrid')) renderListHTMLOnly();
            if(document.getElementById('cabinetContent')) renderCabinetHTMLOnly();
            const tabProfile = document.getElementById('tab-profile');
            if(tabProfile && tabProfile.classList.contains('active')) renderProfile();
        }, 300);
    };

    window.toggleStep = function(idx, totalLength, themeColor) {
        haptic('light');
        // 用户手动点击步骤时，清除定格成品的定时器
        if (animTimer) { clearTimeout(animTimer); clearInterval(animTimer); }
        
        const drink = cocktailDB.find(x => x.id === currentDetailId);
        
        const inactiveBg = isLightMode ? '#E5E5EA' : '#121214';
        const inactiveBorder = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        const inactiveText = isLightMode ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
        const inactiveAxis = isLightMode ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';

        const item = document.getElementById('step-item-' + idx);
        if(!item) return;
        
        const numBg = document.getElementById('step-num-bg-' + idx);
        const numText = document.getElementById('step-num-' + idx);
        const textEl = document.getElementById('step-text-' + idx);
        const axis = document.getElementById('step-axis-' + idx);

        if (item.dataset.done === '1') {
            item.dataset.done = '0';
            numBg.style.backgroundColor = inactiveBg;
            numBg.style.borderColor = inactiveBorder;
            numBg.style.boxShadow = 'none';
            numText.style.color = inactiveText;
            textEl.classList.remove('opacity-50', 'line-through');
            if(axis) axis.style.backgroundColor = inactiveAxis;
        } else {
            item.dataset.done = '1';
            numBg.style.backgroundColor = themeColor;
            numBg.style.borderColor = themeColor;
            numBg.style.boxShadow = `0 0 12px ${themeColor}66`;
            numText.style.color = '#fff';
            textEl.classList.add('opacity-50', 'line-through');
            if(axis) axis.style.backgroundColor = themeColor;
            
            if(drink && drink.steps && drink.steps[idx]) {
                const stage = document.getElementById('animationStage');
                if(stage) {
                    stage.innerHTML = renderStepSvg(drink, drink.steps[idx], idx);
                }
            }
        }
    };

    window.startSim = function(drink) {
        const stage = document.getElementById('animationStage');
        if(stage && drink.steps && drink.steps.length > 0) {
            if(animTimer) { clearInterval(animTimer); clearTimeout(animTimer); }
            
            // 初始展示第一步的入场动效
            stage.innerHTML = renderStepSvg(drink, drink.steps[0], 0);
            
            // 2.5秒后，动画结束，自动定格为没有任何工具遮挡的最终成品图
            animTimer = setTimeout(() => {
                stage.innerHTML = window.getGlassSvgCover(drink.glass, drink.themeColor);
            }, 2500);
        } else if (stage) {
            stage.innerHTML = window.getGlassSvgCover(drink.glass, drink.themeColor);
        }
    };

    window.onload = function() {
        loadLocalData();
        switchPage('recipes', document.getElementById('tab-recipes'));

        // 【极速渲染级手势交互】边缘右滑与下拉手势
        const detailEl = document.getElementById('recipeDetail');
        const detailContent = document.getElementById('detailContent');
        let startY = 0;
        let startX = 0;
        let currentY = 0;
        let currentX = 0;
        let isDraggingVertical = false;
        let isDraggingHorizontal = false;
        let isEdgeSwipe = false;
        let ticking = false;

        detailEl.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDraggingVertical = false;
            isDraggingHorizontal = false;
            // 判断是否从屏幕左侧边缘 (距离左边缘 40px 以内) 开始滑动
            isEdgeSwipe = startX < 40;
            
            // 确保页面内部滚动到了最顶端，才允许下拉退出
            if (detailContent.scrollTop > 5) {
                isEdgeSwipe = false; 
            }
        }, { passive: true });

        detailEl.addEventListener('touchmove', (e) => {
            let deltaX = e.touches[0].clientX - startX;
            let deltaY = e.touches[0].clientY - startY;

            // 首次移动时确定手势的唯一方向
            if (!isDraggingVertical && !isDraggingHorizontal) {
                if (isEdgeSwipe && deltaX > Math.abs(deltaY) && deltaX > 0) {
                    isDraggingHorizontal = true;
                    detailEl.style.transition = 'none';
                    // 不再修改 mainWrap 的 transition
                } else if (deltaY > 0 && detailContent.scrollTop <= 0) {
                    isDraggingVertical = true;
                    detailEl.style.transition = 'none';
                    // 不再修改 mainWrap 的 transition
                } else {
                    return;
                }
            }

            // 处理边缘右滑与下拉 (完全解绑背景缩放，性能释放至最大)
            if (isDraggingHorizontal || isDraggingVertical) {
                if (e.cancelable) e.preventDefault(); 
                
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        if (isDraggingHorizontal) {
                            currentX = deltaX;
                            if (currentX > 0) {
                                // 仅仅移动顶层，背景不参与动态渲染
                                detailEl.style.transform = `translate3d(${currentX}px, 0, 0)`;
                            }
                        } else if (isDraggingVertical) {
                            currentY = deltaY;
                            if (currentY > 0) {
                                // 仅仅移动顶层，背景不参与动态渲染
                                detailEl.style.transform = `translate3d(0, ${currentY}px, 0)`;
                            }
                        }
                        ticking = false;
                    });
                    ticking = true;
                }
            }
        }, { passive: false });

        detailEl.addEventListener('touchend', (e) => {
            if (isDraggingHorizontal) {
                // 右滑超过屏幕宽度 1/3 时触发关闭
                if (currentX > window.innerWidth / 3) {
                    closeRecipeDetail(true); // 传入 true 以向右平滑退出
                } else {
                    // 未达到阈值，弹性回弹回原位
                    detailEl.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
                    detailEl.style.transform = 'translate3d(0, 0, 0)';
                }
            } else if (isDraggingVertical) {
                // 下拉超过 120px 阈值，触发关闭
                if (currentY > 120) {
                    closeRecipeDetail(false);
                } else if (currentY > 0) {
                    // 未达到阈值，弹性回弹回原位
                    detailEl.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
                    detailEl.style.transform = 'translate3d(0, 0, 0)';
                }
            }
            
            // 重置状态
            isDraggingVertical = false;
            isDraggingHorizontal = false;
            isEdgeSwipe = false;
            currentY = 0;
            currentX = 0;
        });
    };
</script>
